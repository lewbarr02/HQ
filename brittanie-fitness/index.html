  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html{-webkit-text-size-adjust:100%;overflow-x:hidden;max-width:100vw;}
    body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#F7F8FC;color:#1A1833;overflow:hidden;height:100%;overflow-x:hidden;max-width:100vw;}
    #root{height:100dvh;display:flex;flex-direction:column;max-width:480px;margin:0 auto;background:#F7F8FC;overflow-x:hidden;width:100%;}
    #app-inner{max-width:100vw !important;overflow-x:hidden !important;}
    .content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px;overflow-x:hidden;max-width:100%;}
    .card{background:#fff;border:1px solid rgba(100,80,220,0.15);border-radius:18px;padding:16px;margin-bottom:12px;box-shadow:0 2px 12px rgba(100,80,220,0.06);}
    .header{padding:12px 20px;padding-top:calc(12px + env(safe-area-inset-top));background:rgba(247,248,252,0.97);border-bottom:1px solid rgba(100,80,220,0.1);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
    .nav{display:flex;background:rgba(247,248,252,0.97);border-top:1px solid rgba(100,80,220,0.1);padding:4px 0;padding-bottom:calc(6px + env(safe-area-inset-bottom));flex-shrink:0;}
    .nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;font-size:9px;font-family:inherit;font-weight:700;color:#8E8EAA;min-height:48px;justify-content:center;}
    .nav-btn.active{color:#00C6FF;}
    .nav-icon{font-size:22px;line-height:1;}
    .nav-svg{display:flex;align-items:center;justify-content:center;}
    .input{width:100%;padding:14px 16px;border-radius:12px;border:1.5px solid rgba(100,80,220,0.18);background:#F0F2F8;color:#1A1833;font-size:16px;font-family:inherit;outline:none;margin-bottom:10px;-webkit-appearance:none;display:block;}
    .input:focus{border-color:#00C6FF;background:#fff;}
    .btn-primary{padding:14px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;border:none;font-family:inherit;min-height:48px;background:linear-gradient(135deg,#00C6FF,#7B2FFF);color:white;width:100%;}
    .btn-ghost{padding:14px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;min-height:48px;background:#F0F2F8;color:#8E8EAA;border:1.5px solid rgba(100,80,220,0.18);width:100%;}
    .grad{background:linear-gradient(135deg,#00C6FF,#7B2FFF);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .habit-circle{width:58px;height:58px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;background:#F0F2F8;border:2.5px solid transparent;position:relative;transition:all 0.2s;}
    .habit-circle.done{background:white;box-shadow:0 0 0 3px rgba(0,198,255,0.15);}
    .stat-tile{background:#fff;border:1px solid rgba(100,80,220,0.1);border-radius:16px;padding:12px 6px;text-align:center;box-shadow:0 2px 8px rgba(100,80,220,0.05);}
    ::-webkit-scrollbar{display:none;}
    .splash{position:fixed;inset:0;z-index:999;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;animation:splashOut 0.5s ease 3.2s forwards;}
    .splash-logo{position:relative;display:flex;align-items:center;justify-content:center;width:200px;height:200px;}
    .splash-ring{position:absolute;border-radius:50%;border:2px solid;width:150px;height:150px;opacity:0;animation:ringExpand 1.4s ease-out forwards;}
    @keyframes ringExpand{0%{transform:scale(0.3);opacity:0.9;}100%{transform:scale(2.6);opacity:0;}}
    @keyframes splashOut{to{opacity:0;pointer-events:none;}}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
    @keyframes pop{from{transform:scale(0.4);opacity:0;}to{transform:scale(1);opacity:1;}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
    @keyframes pulse{0%,100%{box-shadow:0 0 0 3px rgba(245,158,11,0.4);}50%{box-shadow:0 0 0 7px rgba(245,158,11,0.1);}}
    .splash-logo{animation:pop 0.7s cubic-bezier(.34,1.56,.64,1) 0.3s both;}
    .splash-greeting{font-size:24px;font-weight:700;animation:fadeUp 0.5s ease 1.3s both;}
    .splash-sub{color:#8E8EAA;font-size:17px;animation:fadeUp 0.5s ease 1.6s both;}
    .tag{padding:8px 16px;border-radius:22px;font-size:13px;font-weight:700;cursor:pointer;border:1.5px solid rgba(100,80,220,0.18);background:transparent;color:#8E8EAA;font-family:inherit;}
    .tag.active{background:linear-gradient(135deg,#00C6FF,#7B2FFF);border-color:transparent;color:white;}
    .time-btn{width:44px;height:44px;border-radius:50%;border:1.5px solid rgba(100,80,220,0.18);background:#F0F2F8;color:#1A1833;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;}
    input[type=range]{-webkit-appearance:none;height:6px;border-radius:3px;outline:none;cursor:pointer;width:100%;}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,#00C6FF,#7B2FFF);cursor:pointer;}
    .priority-check{width:22px;height:22px;border-radius:50%;border:2px solid rgba(100,80,220,0.3);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:11px;flex-shrink:0;}
    .priority-check.done{background:linear-gradient(135deg,#00C6FF,#7B2FFF);border-color:transparent;color:white;}
    @media(min-width:768px){#root{max-width:none;margin:0;}}
    .sidebar{width:72px;background:#F0F2F8;border-right:1px solid rgba(100,80,220,0.1);display:flex;flex-direction:column;align-items:center;padding:16px 0;gap:2px;flex-shrink:0;}
    .sidebar-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 6px;border-radius:12px;width:60px;border:none;cursor:pointer;font-size:9px;font-family:inherit;font-weight:700;background:transparent;}
    .sidebar-btn.active{background:white;box-shadow:0 1px 6px rgba(100,80,220,0.12);}
  </style>

function takeAutoBackup() {
  var today = new Date().toISOString().slice(0,10);
  if (localStorage.getItem('hq_lastBackup') === today) return;
  var snapshot = {};
  for (var i = 0; i < localStorage.length; i++) {
    var k = localStorage.key(i);
    if (k && k.startsWith('hq_') && !k.startsWith('hq_autobackup_') && k !== 'hq_lastBackup') {
      try { snapshot[k.slice(3)] = JSON.parse(localStorage.getItem(k)); } catch(ex) {}
    }
  }
  try { localStorage.setItem('hq_autobackup_'+today, JSON.stringify({date:today, data:snapshot})); } catch(ex) {}
  localStorage.setItem('hq_lastBackup', today);
  var bks = [];
  for (var j = 0; j < localStorage.length; j++) { var bk = localStorage.key(j); if (bk && bk.startsWith('hq_autobackup_')) bks.push(bk); }
  bks.sort().reverse().slice(7).forEach(function(bk){ localStorage.removeItem(bk); });
}
takeAutoBackup();

async function syncFromSupabase(){
  const {data,error}=await _SB.from('hq_data').select('key,value,updated_at').eq('user_id','brittanie');
  if(error||!data)return;
  data.forEach(row=>{
    // Only overwrite local if Supabase is newer
    var local = localStorage.getItem('hq_'+row.key);
    var localTs = localStorage.getItem('hq_ts_'+row.key);
    if(!localTs || new Date(row.updated_at) > new Date(localTs)){
      try{localStorage.setItem('hq_'+row.key, JSON.stringify(row.value)); localStorage.setItem('hq_ts_'+row.key, row.updated_at);}catch{}
    }
  });
}

function today(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}


function getWeekDates(dateStr){
  var d=new Date(dateStr+'T12:00:00');
  var day=d.getDay();
  var mon=new Date(d);mon.setDate(d.getDate()-(day===0?6:day-1));
  var out=[];
  for(var i=0;i<7;i++){var x=new Date(mon);x.setDate(mon.getDate()+i);out.push(x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0'));}
  return out;
}

function daysSince(workoutLog, muscleId) {
  var keys = Object.keys(workoutLog).sort().reverse();
  for(var i=0;i<keys.length;i++){
    var sessions = workoutLog[keys[i]];
    if(Array.isArray(sessions) && sessions.some(function(s){ return s.groups && s.groups.includes(muscleId); })) {
      var d = new Date(); d.setHours(0,0,0,0);
      var then = new Date(keys[i]+'T12:00:00');
      var diff = Math.round((d-then)/(1000*60*60*24));
      return diff;
    }
  }
  return null; // never logged
}

function freshnessColor(days) {
  if(days === null) return { bg:'#F1F5F9', border:'#CBD5E1', text:MUTED, label:'Never' };
  if(days === 0)    return { bg:'#D1FAE5', border:'#10B981', text:'#065F46', label:'Today' };
  if(days === 1)    return { bg:'#D1FAE5', border:'#10B981', text:'#065F46', label:'Yesterday' };
  if(days <= 3)     return { bg:'#FEF9C3', border:'#EAB308', text:'#713F12', label: days+'d ago' };
  if(days <= 5)     return { bg:'#FEE2E2', border:'#EF4444', text:'#7F1D1D', label: days+'d ago' };
  return             { bg:'#F1F0FF', border:'#8B5CF6', text:'#4C1D95', label: days+'d ago' };
}

function computeDaysToGoal(input) {
  var weighIns = input.weighIns || {};              // {date: weightLbs}
  var goalWeight = parseFloat(input.goalWeight);
  var todayCaloriesIn = input.todayCaloriesIn || 0;
  var todayActiveCalories = input.todayActiveCalories || 0;
  var currentWeightLbs = input.currentWeightLbs;
  var alpha = input.alpha || 0.12;                  // EWMA smoothing factor (0.1–0.15 suggested)
  var heightIn = input.heightIn || 69;               // 5'9"
  var age = input.age || 43;
  var sex = input.sex || 'male';
  var activityMultiplier = input.activityMultiplier || 1.2;
  var todayDate = input.todayDate || today();
  var assumedWeeklyPct = input.assumedWeeklyPct || 0.01;  // 1% bodyweight/week — standard moderate pace, used until a measured trend exists

  // Fallback projection from known stats alone (no weigh-in history required) — a placeholder
  // estimate, not a measurement, so callers must label it distinctly from a real trend.
  function estimateFromAssumedPace(weight, explanation) {
    if (!weight || !goalWeight) return null;
    var direction = Math.sign(goalWeight - weight) || 0;
    if (direction === 0) {
      return { daysToGoal:0, state:'estimated', trendWeightToday:Math.round(weight*10)/10, dailyRate:0, trendDirection:'flat', explanation:'You\'re already at your goal weight.' };
    }
    var weeklyRateLbs = weight * assumedWeeklyPct;
    var days = Math.abs(goalWeight - weight) / weeklyRateLbs * 7;
    return {
      daysToGoal: Math.round(days), state:'estimated', trendWeightToday: Math.round(weight*10)/10,
      dailyRate: Math.round((weeklyRateLbs/7)*1000)/1000, trendDirection: null,
      explanation: explanation || ('Estimated at a standard ' + Math.round(assumedWeeklyPct*1000)/10 + '%/week pace — log weigh-ins to replace this with your measured trend.')
    };
  }

  var dates = Object.keys(weighIns).filter(function(d){ return !isNaN(parseFloat(weighIns[d])); }).sort();
  if (!goalWeight) {
    return { daysToGoal:null, state:'no-data', trendWeightToday:currentWeightLbs||null, dailyRate:null, trendDirection:null, explanation:'Set a goal weight to start tracking.' };
  }
  if (dates.length === 0) {
    return estimateFromAssumedPace(currentWeightLbs) ||
      { daysToGoal:null, state:'no-data', trendWeightToday:null, dailyRate:null, trendDirection:null, explanation:'Log a weigh-in to start tracking.' };
  }

  // EWMA trend line — filters day-to-day water-weight noise out of the raw scale numbers
  var trend = {};
  dates.forEach(function(d, i){
    var w = parseFloat(weighIns[d]);
    trend[d] = i===0 ? w : alpha*w + (1-alpha)*trend[dates[i-1]];
  });
  var trendToday = trend[dates[dates.length-1]];

  var msDay = 86400000;
  var todayMs = new Date(todayDate+'T12:00:00').getTime();
  var firstMs = new Date(dates[0]+'T12:00:00').getTime();
  var spanDays = Math.max(1, Math.round((todayMs-firstMs)/msDay));
  var calibrating = spanDays < 14;

  // Trailing 14-day rate, or a simple full-range slope when calibrating
  var d14 = dates.filter(function(d){ return (todayMs-new Date(d+'T12:00:00').getTime()) <= 14*msDay; });
  var rateDate = calibrating ? dates[0] : d14[0];
  var rateSpanDays = Math.max(1, Math.round((todayMs-new Date(rateDate+'T12:00:00').getTime())/msDay));
  var rawSlope = (trendToday - trend[rateDate]) / rateSpanDays; // lbs/day, negative while losing weight

  var direction = Math.sign(goalWeight - trendToday) || 0; // -1 need to lose, +1 need to gain
  var dailyRate = direction * rawSlope;                     // positive = trending correctly toward goal
  var roundedRate = Math.round(dailyRate*100)/100;

  if (dailyRate <= 0) {
    // Fewer than 14 days of real weigh-ins isn't enough to trust as a genuine stall — bridge
    // the gap with the assumed-pace estimate instead of stopping the projection cold.
    if (calibrating) {
      var bridged = estimateFromAssumedPace(trendToday, 'Estimated at a standard pace while your measured trend calibrates — log a few more weigh-ins to refine it.');
      if (bridged) { bridged.state = 'calibrating'; return bridged; }
    }
    return {
      daysToGoal:null, state: 'no-trend',
      trendWeightToday: Math.round(trendToday*10)/10, dailyRate: roundedRate,
      trendDirection: dailyRate < -0.01 ? 'slipping' : 'flat',
      explanation: 'Recalculating — no clear trend yet.'
    };
  }

  var layer1Days = Math.abs(trendToday - goalWeight) / dailyRate;

  // Layer 2 — reactive same-day nudge from estimated calorie balance (Mifflin-St Jeor BMR)
  var weightKg = (currentWeightLbs||trendToday) * 0.453592;
  var heightCm = heightIn * 2.54;
  var bmr = 10*weightKg + 6.25*heightCm - 5*age + (sex==='male'?5:-161);
  var estCaloriesOutToday = bmr*activityMultiplier + todayActiveCalories;
  var actualDeficitToday = estCaloriesOutToday - todayCaloriesIn;
  var requiredDailyDeficit = direction < 0 ? dailyRate*3500 : -dailyRate*3500;
  var deficitGap = actualDeficitToday - requiredDailyDeficit; // >0 ahead of pace, <0 behind
  var dayAdjustment = -deficitGap / 3500;                      // behind pace -> positive days added
  var adjustedDays = Math.max(0, layer1Days + dayAdjustment);

  var explanation = null;
  if (dayAdjustment > 0.05) {
    explanation = 'Calories ran over today — goal date pushed back ' + (Math.round(dayAdjustment*10)/10) + ' day' + (dayAdjustment>=1.05?'s':'') + '.';
  } else if (dayAdjustment < -0.05) {
    explanation = 'Ahead of pace today — goal date pulled in ' + (Math.round(-dayAdjustment*10)/10) + ' day' + (-dayAdjustment>=1.05?'s':'') + '.';
  }

  return {
    daysToGoal: Math.round(adjustedDays),
    state: calibrating ? 'calibrating' : 'ok',
    trendWeightToday: Math.round(trendToday*10)/10,
    dailyRate: roundedRate,
    trendDirection: dayAdjustment > 0.05 ? 'slipping' : (dayAdjustment < -0.05 ? 'improving' : 'flat'),
    explanation: explanation
  };
}

  function finishExecute() {
    if(!executeDay) return;
    // Build exercises array from logged sets
    var exercises = (executeDay.exercises||[]).map(function(ex){
      var logged = (executeSets[ex.name]||[]).filter(function(s){return s.done;});
      if(!logged.length) return null;
      // Use last done set's weight/reps as the representative value
      var last = logged[logged.length-1];
      return {
        name: ex.name,
        weight: last.weight ? parseFloat(last.weight) : null,
        reps: last.reps ? parseInt(last.reps) : null,
        sets: logged.length,
        allSets: logged.map(function(s){return {weight:parseFloat(s.weight)||null,reps:parseInt(s.reps)||null};})
      };
    }).filter(Boolean);

    var groups = [];
    var exerciseGroupMap = {
      'bench':['chest'],'incline':['chest','front_delt'],'fly':['chest'],
      'lateral':['side_delt'],'delt':['side_delt'],'tricep':['triceps'],'pushdown':['triceps'],
      'row':['lats','traps'],'pulldown':['lats'],'pull-up':['lats'],'pullup':['lats'],
      'curl':['biceps'],'rear':['rear_delt'],'squat':['quads','glutes'],'leg press':['quads'],
      'deadlift':['hamstrings','glutes'],'rdl':['hamstrings','glutes'],'calf':['calves'],
      'overhead press':['front_delt','side_delt'],'ohp':['front_delt','side_delt'],
      'shrug':['traps'],'ab':['abs'],'crunch':['abs'],'plank':['abs'],'oblique':['obliques'],
    };
    var groupSet = {};
    exercises.forEach(function(ex){
      var lower = ex.name.toLowerCase();
      Object.keys(exerciseGroupMap).forEach(function(kw){
        if(lower.includes(kw)) exerciseGroupMap[kw].forEach(function(g){groupSet[g]=true;});
      });
    });
    groups = Object.keys(groupSet);

    var durationMin = executeStartTime ? Math.round((Date.now()-executeStartTime)/60000) : null;
    var entry = {
      id:'w'+Date.now(),
      groups: groups,
      sets: exercises.reduce(function(s,ex){return s+(ex.sets||0);},0),
      note: '',
      programDay: executeDay.dayLabel,
      exercises: exercises,
      duration: durationMin,
    };
    var td = executeDate || today();
    var day = safeLog[td]||[];
    var newLog = Object.assign({},safeLog,{[td]:[...day,entry]});
    setWorkoutLog(newLog); save('workoutLog',newLog);
    autoCheckExercise(td, habitLog);
    addPassiveWin('Logged a workout: '+(executeDay.dayLabel||groups.join(', ')));

    // Update lastWeight/lastReps on the program
    if(currentProgram && exercises.length>0){
      var updatedProg = JSON.parse(JSON.stringify(currentProgram));
      updatedProg.days = updatedProg.days.map(function(d){
        if(d.dayLabel!==executeDay.dayLabel) return d;
        return Object.assign({},d,{exercises:d.exercises.map(function(ex){
          var logged = exercises.find(function(e){return e.name===ex.name;});
          if(!logged) return ex;
          return Object.assign({},ex,{
            lastWeight: logged.weight||ex.lastWeight,
            lastReps: logged.reps||ex.lastReps,
            lastLogged: new Date().toISOString(),
          });
        })});
      });
      setCurrentProgram(updatedProg); save('currentProgram',updatedProg);
    }

    setExecuteDay(null); setExecuteSets({}); setExecuteStartTime(null);
    setExecuteElapsed(0); setExecuteRestSecs(0); setExecuteActiveEx(null);
    setExecuteDate(today());
    clearWip();
    setSelectedProgramDay(null); setProgramExerciseLogs({}); setSelectedGroups([]);
    setView('log');
  }

      var sets = (executeSets[exName]||[]).slice();
      var idx = sets.findIndex(function(s){return !s.done;});
      if(idx===-1) return;
      sets[idx] = {weight:w, reps:r, done:true};

  function renderAnalysis(text) {
    var SEC = [
      {match:['overall','assessment'],          icon:'🎯', color:'#EF4444', bg:'#FEF2F2'},
      {match:['workout','training','focus','muscle','body part'], icon:'💪', color:'#3B82F6', bg:'#EFF6FF'},
      {match:['nutrition','food','macro','calorie','diet'],       icon:'🥗', color:'#10B981', bg:'#F0FDF4'},
      {match:['action','specific','this week','steps','todo'],    icon:'⚡', color:'#8B5CF6', bg:'#F5F3FF'},
      {match:['track','date','timeline','goal','on-track'],       icon:'📅', color:'#F59E0B', bg:'#FFFBEB'},
    ];
    function getCfg(title) {
      var t = title.toLowerCase();
      for(var s of SEC) if(s.match.some(function(k){return t.includes(k);})) return s;
      return {icon:'📌', color:PURPLE, bg:'#F5F3FF'};
    }
    function renderInline(str) {
      return str.split(/(\*\*[^*]+\*\*)/g).map(function(p,i){
        if(p.startsWith('**')&&p.endsWith('**')) return e('strong',{key:i,style:{fontWeight:800,color:TEXT}},p.slice(2,-2));
        return p;
      });
    }
    function renderBody(lines) {
      return lines.map(function(line,i){
        if(!line.trim()) return e('div',{key:i,style:{height:5}});
        var isBullet=/^[-*•]\s/.test(line.trim()), isNum=/^\d+\.\s/.test(line.trim());
        var isSub=line.match(/^#{3,4}\s/) || (/^\*\*/.test(line)&&/\*\*$/.test(line.trim())&&!isBullet&&!isNum);
        if(isSub){
          var clean=line.replace(/^#{3,4}\s*/,'').replace(/^\*+/,'').replace(/\*+$/,'').trim();
          return e('div',{key:i,style:{fontSize:11,fontWeight:800,color:'#666',textTransform:'uppercase',letterSpacing:0.8,marginTop:8,marginBottom:3}},clean);
        }
        var stripped=line.replace(/^[-*•]\s/,'').replace(/^\d+\.\s/,'');
        return e('div',{key:i,style:{display:'flex',gap:8,marginBottom:2,alignItems:'flex-start'}},
          (isBullet||isNum)?e('span',{style:{flexShrink:0,fontWeight:800,color:'#999',fontSize:12,marginTop:2}},isBullet?'•':line.match(/^\d+/)[0]+'.'):null,
          e('div',{style:{fontSize:13,lineHeight:1.75,color:'#444'}}, ...renderInline(stripped))
        );
      });
    }
    // Parse into sections
    var lines = text.split('\n');
    var sections=[], cur=null;
    for(var line of lines){
      var hm = line.match(/^#{1,3}\s+(.+)/) || line.match(/^\*?\*?(\d+\.\s+[A-Z][^\n]+)/);
      var htitle = hm ? hm[1].replace(/\*+$/,'').replace(/^\d+\.\s*/,'').trim() : null;
      var isSecHeader = htitle && /overall|workout|training|nutrition|action|track|focus|check|specific|on-track/i.test(htitle);
      if(isSecHeader){
        if(cur) sections.push(cur);
        cur={title:htitle, lines:[]};
      } else if(cur){
        cur.lines.push(line);
      }
    }
    if(cur) sections.push(cur);
    if(!sections.length) {
      return text.split('\n').map(function(line,i){return e('div',{key:i,style:{fontSize:13,color:'#444',lineHeight:1.7}},line);});
    }
    return sections.map(function(sec,si){
      var cfg=getCfg(sec.title);
      return e('div',{key:si,style:{background:cfg.bg,borderRadius:16,padding:'14px 16px',borderLeft:'4px solid '+cfg.color,marginBottom:10,boxShadow:'0 1px 4px rgba(0,0,0,0.06)'}},

        ...renderBody(sec.lines)
      );
    });
  }

  function renderWatch() {
    var ACCENT_WATCH = '#30D158'; // Apple green
    var sorted = watchLog.slice().sort(function(a,b){return a.date<b.date?1:-1;});

    // Trend data — last 8 weeks by week
    function weekKey(dateStr) {
      var d = new Date(dateStr+'T12:00:00');
      var day = d.getDay(); // 0=Sun
      var monday = new Date(d); monday.setDate(d.getDate() - ((day+6)%7));
      return monday.toISOString().slice(0,10);
    }
    var byWeek = {};
    watchLog.forEach(function(w){
      if(!w.date) return;
      var wk = weekKey(w.date);
      if(!byWeek[wk]) byWeek[wk] = {activeCal:0,sessions:0,minutes:0};
      byWeek[wk].activeCal += (w.activeCalories||0);
      byWeek[wk].sessions  += 1;
      byWeek[wk].minutes   += (w.duration||0);
    });
    var weekKeys = Object.keys(byWeek).sort().slice(-8);
    var maxCal = Math.max(1, ...weekKeys.map(function(k){return byWeek[k].activeCal;}));

    // 30-day totals
    var cutoff = new Date(); cutoff.setDate(cutoff.getDate()-30);
    var last30 = watchLog.filter(function(w){return w.date && new Date(w.date+'T12:00:00')>=cutoff;});
    var total30Cal  = last30.reduce(function(s,w){return s+(w.activeCalories||0);},0);
    var total30Sess = last30.length;
    var avg30Min    = total30Sess ? Math.round(last30.reduce(function(s,w){return s+(w.duration||0);},0)/total30Sess) : 0;

    function resizeAndUpload(file) {
      setWatchUploading(true); setWatchError(null);
      var reader = new FileReader();
      reader.onload = function(ev) {
        var img = new Image();
        img.onload = async function() {
          var MAX=1200, w=img.width, h=img.height;
          if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}
          var canvas=document.createElement('canvas'); canvas.width=w; canvas.height=h;
          canvas.getContext('2d').drawImage(img,0,0,w,h);
          var b64 = canvas.toDataURL('image/jpeg',0.82).split(',')[1];
          try {
            var resp = await fetch(COACH_URL,{method:'POST',headers:{'Content-Type':'application/json','Authorization':COACH_AUTH},body:JSON.stringify({type:'extract-watch-screenshot',photo:b64})});
            if(!resp.ok){var t=await resp.text();throw new Error(t);}
            var result = await resp.json();
            if(!result.parsed) throw new Error('Could not read workout data from screenshot.');
            var entry = Object.assign({id:'ww'+Date.now(), uploadedAt:new Date().toISOString()}, result.parsed);
            if(!entry.date) entry.date = today();
            var newLog = [entry, ...watchLog];
            setWatchLog(newLog); save('watchLog', newLog);
          } catch(err){ setWatchError(err.message||'Upload failed.'); }
          setWatchUploading(false);
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    }

    function deleteEntry(id) {
      var newLog = watchLog.filter(function(w){return w.id!==id;});
      setWatchLog(newLog); save('watchLog',newLog);
    }

    return e('div',{style:{display:'flex',flexDirection:'column',gap:16,padding:'16px'}},

      // Upload card

              e('label',{style:{display:'inline-block',padding:'12px 28px',borderRadius:12,background:'linear-gradient(135deg,'+ACCENT_WATCH+',#00C6FF)',color:'white',fontSize:14,fontWeight:800,cursor:'pointer'}},
                '+ Add Screenshot',
                e('input',{type:'file',accept:'image/*',style:{display:'none'},onChange:function(ev){if(ev.target.files[0])resizeAndUpload(ev.target.files[0]);}})
              )
            ),

      ),

      // 30-day summary pills
      last30.length>0?e('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10}},
        e('div',{style:{background:'#F0FDF4',borderRadius:14,padding:'14px 12px',textAlign:'center',border:'1px solid #86EFAC'}},
          e('div',{style:{fontSize:20,fontWeight:800,color:ACCENT_WATCH}},total30Cal.toLocaleString()),
          e('div',{style:{fontSize:10,fontWeight:700,color:'#166534',textTransform:'uppercase',letterSpacing:0.6}},'Active Cal'),
          e('div',{style:{fontSize:10,color:'#4ADE80'}},'30 days')
        ),
        e('div',{style:{background:'#EFF6FF',borderRadius:14,padding:'14px 12px',textAlign:'center',border:'1px solid #93C5FD'}},

      weekKeys.length>0?e('div',{style:{background:'#fff',borderRadius:16,padding:'16px',border:'1px solid '+BORDER}},

        e('div',{style:{display:'flex',alignItems:'flex-end',gap:6,height:80}},
          ...weekKeys.map(function(wk){
            var wkData=byWeek[wk];
            var pct=Math.max(4,Math.round((wkData.activeCal/maxCal)*100));

  function renderProgress() {
    var td = today();
    var goalWeight = parseFloat(coachGoalWeight) || 188;

    // Weight trend — last 30 days from bodyWeightLog (shared with the weekly coach check-in)
    var cutoff30 = new Date(); cutoff30.setDate(cutoff30.getDate()-30);
    var weightEntries = Object.entries(bodyWeightLog||{})
      .filter(function(en){ return new Date(en[0]+'T12:00:00') >= cutoff30; })
      .sort(function(a,b){ return a[0]<b[0]?-1:1; })
      .map(function(en){ return {date:en[0], weight:parseFloat(en[1])}; });
    var latestWeight = weightEntries.length ? weightEntries[weightEntries.length-1].weight : (parseFloat(coachWeight)||null);
    var firstWeight = weightEntries.length ? weightEntries[0].weight : null;
    var trendDelta = (latestWeight!=null && firstWeight!=null) ? Math.round((latestWeight-firstWeight)*10)/10 : null;

    function saveWeighIn() {
      var v = parseFloat(weighInDraft);
      if(!isNaN(v) && v>0) {
        var next = Object.assign({}, bodyWeightLog, {[td]: v});
        setBodyWeightLog(next); save('bodyWeightLog', next);
      }
      setShowWeighIn(false); setWeighInDraft('');
    }

    // Nutrition — today (same macroLog/macroTargets the Macros screen writes to)
    var macroLogData = load('macroLog') || {};
    var macroTargets = load('macroTargets') || {cal:2200,protein:180,carbs:200,fat:65};
    var todayMeals = macroLogData[td] || [];
    var macroTotals = todayMeals.reduce(function(acc,m){
      acc.cal += parseFloat(m.cal)||0; acc.protein += parseFloat(m.protein)||0;
      acc.carbs += parseFloat(m.carbs)||0; acc.fat += parseFloat(m.fat)||0;
      return acc;
    }, {cal:0,protein:0,carbs:0,fat:0});

    // Checked protein-checklist items add straight into the Calories/Protein rings —
    // protein grams = proteinPer100g scaled to the item's current serving size
    function proteinGramsFor(s) { return Math.round((parseFloat(s.proteinPer100g)||0)/100*(parseFloat(s.servingGrams)||0)); }
    function calGramsFor(s) { return Math.round((parseFloat(s.calPer100g)||0)/100*(parseFloat(s.servingGrams)||0)); }
    var todayProtein = proteinLog[td] || {};
    proteinStaples.forEach(function(s){
      if (todayProtein[s.id]) { macroTotals.protein += proteinGramsFor(s); macroTotals.cal += calGramsFor(s); }
    });

    // Days-to-goal
    var todayActiveCal = (watchLog||[]).filter(function(w){return w.date===td;}).reduce(function(s,w){return s+(w.activeCalories||0);},0);
    var goalResult = computeDaysToGoal({
      weighIns: bodyWeightLog||{}, goalWeight: goalWeight,
      todayCaloriesIn: macroTotals.cal, todayActiveCalories: todayActiveCal,
      currentWeightLbs: latestWeight, todayDate: td,
    });
    var onTrackDate = goalResult.daysToGoal != null
      ? new Date(Date.now()+goalResult.daysToGoal*86400000).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})
      : null;
    var goalStateLabel = goalResult.state==='ok'
      ? (goalResult.trendDirection==='slipping' ? '▲ Slipping' : goalResult.trendDirection==='improving' ? '▼ Improving' : 'On track')
      : goalResult.state==='calibrating' ? 'Calibrating'
      : goalResult.state==='estimated' ? 'Estimated'
      : goalResult.state==='no-trend' ? 'Recalculating' : 'No data yet';

    // Photos — reuses the same photoIndex / hq_photo_<date> storage as Progress Photos
    var startingEntry = progressStartMeta;
    var currentEntry = progressCurrentMeta;
    var startingPhoto = progressStartPhoto;
    var currentPhoto = progressCurrentPhoto;

    function compressProgressPhoto(file, cb) {
      var reader = new FileReader();
      reader.onload = function(ev) {
        var img = new Image();
        img.onload = function() {
          var MAX = 600;
          var scale = Math.min(1, MAX / Math.max(img.width, img.height));
          var w = Math.round(img.width * scale);
          var h = Math.round(img.height * scale);
          var canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          var ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, w, h);
          cb(canvas.toDataURL('image/jpeg', 0.72));
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    }
    function handleStartPhotoFile(ev) {
      var file = ev.target.files && ev.target.files[0];
      if(!file) return;
      compressProgressPhoto(file, function(dataUrl){
        localStorage.setItem('hq_photo_progress_start', dataUrl);
        var meta = {date: today()};
        save('progressStartMeta', meta);
        setProgressStartPhoto(dataUrl);
        setProgressStartMeta(meta);
      });
      ev.target.value = '';
    }
    function handleCurrentPhotoFile(ev) {
      var file = ev.target.files && ev.target.files[0];
      if(!file) return;
      compressProgressPhoto(file, function(dataUrl){
        localStorage.setItem('hq_photo_progress_current', dataUrl);
        var meta = {date: today()};
        save('progressCurrentMeta', meta);
        setProgressCurrentPhoto(dataUrl);
        setProgressCurrentMeta(meta);
      });
      ev.target.value = '';
    }
    function handleGoalPhotoFile(ev) {
      var file = ev.target.files && ev.target.files[0];
      if(!file) return;
      compressProgressPhoto(file, function(dataUrl){
        localStorage.setItem('hq_photo_progress_goal', dataUrl);
        var meta = {date: today()};
        save('progressGoalMeta', meta);
        setProgressGoalPhoto(dataUrl);
        setProgressGoalMeta(meta);
      });
      ev.target.value = '';
    }

    function photoTile(label, dateStr, photoSrc, active, actionLabel, onAction) {

        e('div',{style:{fontSize:10,color:MUTED,textAlign:'center'}}, dateStr||'—'),
        e('button',{onClick:onAction,style:{

    }

    // Protein checklist — reuses the .habit-circle pattern from the Home habit tracker
    var proteinDoneCount = proteinStaples.filter(function(s){return !!todayProtein[s.id];}).length;
    function toggleProtein(id) {
      var day = Object.assign({}, todayProtein, {[id]: !todayProtein[id]});
      var next = Object.assign({}, proteinLog, {[td]: day});
      setProteinLog(next); save('proteinLog', next);
    }
    function saveStaples(next) { setProteinStaples(next); save('proteinStaples', next); }
    function openAddStaple() { setProteinForm({label:'', emoji:'🍽️', proteinPer100g:'', calPer100g:'', servingGrams:''}); }
    function openEditStaple(s) { setProteinForm({id:s.id, label:s.label, emoji:s.emoji, proteinPer100g:String(s.proteinPer100g), calPer100g:String(s.calPer100g), servingGrams:String(s.servingGrams)}); }
    function deleteStaple(id) {
      saveStaples(proteinStaples.filter(function(s){return s.id!==id;}));
      if (todayProtein[id]) toggleProtein(id);
    }
    function saveStapleForm() {
      var f = proteinForm;
      if (!f.label.trim()) return;
      var entry = {
        id: f.id || ('p'+Date.now()),
        label: f.label.trim(),
        emoji: f.emoji.trim() || '🍽️',
        proteinPer100g: parseFloat(f.proteinPer100g)||0,
        calPer100g: parseFloat(f.calPer100g)||0,
        servingGrams: parseFloat(f.servingGrams)||0,
      };
      var next = f.id ? proteinStaples.map(function(s){return s.id===f.id?entry:s;}) : proteinStaples.concat([entry]);
      saveStaples(next);
      setProteinForm(null);

    function ring(pct, size, stroke, color) {
      var r=(size-stroke)/2, c=2*Math.PI*r, clamped=Math.max(0,Math.min(1,pct));
      return e('svg',{width:size,height:size,viewBox:'0 0 '+size+' '+size,style:{transform:'rotate(-90deg)',flexShrink:0}},

      );
    }
    function ringTile(size, stroke, color, value, target, label, unit) {

    function weightChart() {
      var entries = weightEntries.length ? weightEntries : (latestWeight!=null?[{date:td,weight:latestWeight}]:[]);
      if (!entries.length) return e('div',{style:{textAlign:'center',color:MUTED,fontSize:13,padding:'20px 0'}}, 'Log a weigh-in to see your trend.');
      var W=300,H=120,padL=6,padR=6,padT=10,padB=8;
      var innerW=W-padL-padR, innerH=H-padT-padB;
      var vals = entries.map(function(p){return p.weight;}).concat([goalWeight]);
      var minW=Math.min.apply(null,vals)-2, maxW=Math.max.apply(null,vals)+2;
      function x(i){ return padL + (entries.length<=1?innerW/2:(i/(entries.length-1))*innerW); }
      function y(w){ return padT + innerH - ((w-minW)/(maxW-minW))*innerH; }
      var pathD = entries.map(function(pt,i){ return (i===0?'M':'L')+x(i).toFixed(1)+','+y(pt.weight).toFixed(1); }).join(' ');
      var goalY = y(goalWeight);
      return e('div',{},
        e('svg',{width:'100%',viewBox:'0 0 '+W+' '+H,style:{display:'block'}},
          e('line',{x1:padL,y1:goalY,x2:W-padR,y2:goalY,stroke:MUTED,strokeWidth:1,strokeDasharray:'4,3'}),
          e('text',{x:W-padR,y:goalY-4,fontSize:9,fill:MUTED,textAnchor:'end'},'Goal '+goalWeight),
          e('path',{d:pathD,fill:'none',stroke:ACCENT,strokeWidth:2.5,strokeLinejoin:'round',strokeLinecap:'round'}),
          ...entries.map(function(pt,i){return e('circle',{key:i,cx:x(i),cy:y(pt.weight),r:3,fill:ACCENT});})
        ),
        e('div',{style:{display:'flex',justifyContent:'space-between',fontSize:9,color:MUTED,marginTop:4}},
          e('span',{},new Date(entries[0].date+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})),
          e('span',{},new Date(entries[entries.length-1].date+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}))
        )
      );
    }

    return e('div',{style:{display:'flex',flexDirection:'column',gap:16,padding:'16px'}},

      // 1. Physique Progress
      e('div',{style:{background:'#fff',borderRadius:16,padding:'16px',border:'1px solid '+BORDER}},

        e('div',{style:{display:'flex',gap:10}},
          photoTile('Starting Point', startingEntry?new Date(startingEntry.date+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):null, startingPhoto, false, startingPhoto?'Retake Photo':'Add Photo', function(){startPhotoRef.current && startPhotoRef.current.click();}),
          photoTile('Current', currentEntry?new Date(currentEntry.date+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):null, currentPhoto, true, 'Update Photo', function(){currentPhotoRef.current && currentPhotoRef.current.click();}),
          photoTile('Goal', progressGoalMeta?new Date(progressGoalMeta.date+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):null, progressGoalPhoto, false, progressGoalPhoto?'Retake Photo':'Add Photo', function(){goalPhotoRef.current && goalPhotoRef.current.click();})
        )

        e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}},

                e('div',{style:{fontSize:40,fontWeight:800,color:'white',lineHeight:1}}, (goalResult.state==='estimated'?'~':'')+goalResult.daysToGoal),
                e('div',{style:{fontSize:11,fontWeight:700,color:'rgba(255,255,255,0.8)',letterSpacing:0.5,marginTop:4}}, 'DAYS AWAY FROM YOUR GOAL')
              )
            : e('div',{style:{fontSize:15,fontWeight:700,color:'white',maxWidth:200,lineHeight:1.4}}, goalResult.explanation),
          e('div',{style:{fontSize:10,fontWeight:800,color:'white',background:'rgba(255,255,255,0.2)',padding:'4px 10px',borderRadius:10,whiteSpace:'nowrap'}}, goalStateLabel)
        ),

        goalResult.explanation && goalResult.daysToGoal!=null ? e('div',{style:{marginTop:8,fontSize:11,color:'rgba(255,255,255,0.85)',background:'rgba(0,0,0,0.15)',borderRadius:8,padding:'8px 10px'}}, goalResult.explanation) : null
      ),

function MacroScreen({ setTab }) {
  var DEFAULT_TARGETS = {cal:2200, protein:180, carbs:200, fat:65};
  var [macroLog, setMacroLog] = useState(function(){ return load('macroLog') || {}; });
  var [targets, setTargets] = useState(function(){ return load('macroTargets') || DEFAULT_TARGETS; });
  var [logDate, setLogDate] = useState(today());
  var [adding, setAdding] = useState(false);
  var [editTarget, setEditTarget] = useState(null); // 'cal'|'protein'|'carbs'|'fat'
  var [targetDraft, setTargetDraft] = useState('');
  var [form, setForm] = useState({name:'',cal:'',protein:'',carbs:'',fat:''});
  var [editingMeal, setEditingMeal] = useState(null); // meal id being edited

  var td = today();

  function saveMacroLog(next){ setMacroLog(next); save('macroLog', next); }
  function saveTargets(next){ setTargets(next); save('macroTargets', next); }

  function shiftDate(d) {
    var dt = new Date(logDate+'T12:00:00');
    dt.setDate(dt.getDate()+d);
    var dk = dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');
    if(dk <= td) setLogDate(dk);
  }

  var meals = macroLog[logDate] || [];
  var totals = meals.reduce(function(acc,m){
    acc.cal += parseFloat(m.cal)||0;
    acc.protein += parseFloat(m.protein)||0;
    acc.carbs += parseFloat(m.carbs)||0;
    acc.fat += parseFloat(m.fat)||0;
    return acc;
  }, {cal:0,protein:0,carbs:0,fat:0});

  function addMeal() {
    if(!form.name.trim()) return;
    var meal = {
      id: Date.now().toString(),
      name: form.name.trim(),
      cal: parseFloat(form.cal)||0,
      protein: parseFloat(form.protein)||0,
      carbs: parseFloat(form.carbs)||0,
      fat: parseFloat(form.fat)||0,
    };
    var next = Object.assign({}, macroLog);
    if(editingMeal) {
      next[logDate] = (next[logDate]||[]).map(function(m){ return m.id===editingMeal ? meal : m; });
      meal.id = editingMeal;
      next[logDate] = (next[logDate]||[]).map(function(m){ return m.id===editingMeal ? Object.assign({},meal,{id:editingMeal}) : m; });
    } else {
      next[logDate] = (next[logDate]||[]).concat([meal]);
    }
    saveMacroLog(next);
    setForm({name:'',cal:'',protein:'',carbs:'',fat:''});
    setAdding(false);
    setEditingMeal(null);
  }

  function deleteMeal(id) {
    var next = Object.assign({}, macroLog);
    next[logDate] = (next[logDate]||[]).filter(function(m){ return m.id!==id; });
    saveMacroLog(next);
  }

  function startEdit(meal) {
    setForm({name:meal.name,cal:String(meal.cal||''),protein:String(meal.protein||''),carbs:String(meal.carbs||''),fat:String(meal.fat||'')});
    setEditingMeal(meal.id);
    setAdding(true);
  }

  function commitTarget() {
    var v = parseFloat(targetDraft);
    if(!isNaN(v) && v > 0) {
      var next = Object.assign({}, targets, {[editTarget]: Math.round(v)});
      saveTargets(next);
    }
    setEditTarget(null);
    setTargetDraft('');
  }

  var isToday = logDate === td;
  var dispDate = isToday ? 'Today' : new Date(logDate+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});

  var MACRO_BARS = [

    {key:'protein',label:'Protein',  unit:'g',    color:'#00C6FF'},

  ];

      e('div', {style:{fontSize:20,fontWeight:800,color:TEXT}}, '🥗 Macros'),
      e('div', {style:{display:'flex',alignItems:'center',gap:4,marginLeft:'auto'}},
        e('button', {onClick:function(){shiftDate(-1);}, style:{background:'none',border:'none',fontSize:18,color:MUTED,cursor:'pointer',padding:'2px 6px',lineHeight:1}}, '‹'),
        e('div', {style:{fontSize:13,fontWeight:700,color:TEXT,minWidth:60,textAlign:'center'}}, dispDate),
        e('button', {onClick:function(){shiftDate(1);}, disabled:isToday, style:{background:'none',border:'none',fontSize:18,color:isToday?'#ddd':MUTED,cursor:isToday?'default':'pointer',padding:'2px 6px',lineHeight:1}}, '›')
      )
    ),

    // Progress bars
    e('div', {className:'card', style:{marginBottom:16}},
      ...MACRO_BARS.map(function(bar, i){
        var val = Math.round(totals[bar.key]);

        return e('div', {key:bar.key, style:{marginBottom: i<3?14:0}},
          e('div', {style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:5}},
            e('button', {

        )

    // Add meal button
    !adding ? e('button', {

function ProgressPhotosScreen({ setTab }) {
  var [index, setIndex] = useState(function(){ return load('photoIndex') || []; });
  var [viewing, setViewing] = useState(null); // {date, dataUrl, note}
  var [adding, setAdding] = useState(false);
  var [note, setNote] = useState('');
  var [pending, setPending] = useState(null); // compressed dataUrl before saving
  var [uploading, setUploading] = useState(false);
  var fileRef = React.useRef(null);

  function saveIndex(next) { setIndex(next); save('photoIndex', next); }

  function compressImage(file, cb) {
    var reader = new FileReader();
    reader.onload = function(ev) {
      var img = new Image();
      img.onload = function() {
        var MAX = 600;
        var scale = Math.min(1, MAX / Math.max(img.width, img.height));
        var w = Math.round(img.width * scale);
        var h = Math.round(img.height * scale);
        var canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        var ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        cb(canvas.toDataURL('image/jpeg', 0.72));
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  }

  function handleFile(ev) {
    var file = ev.target.files && ev.target.files[0];
    if(!file) return;
    setUploading(true);
    compressImage(file, function(dataUrl) {
      setPending(dataUrl);
      setUploading(false);
      setAdding(true);
    });
    ev.target.value = '';
  }

  function savePhoto() {
    if(!pending) return;
    var dt = today();
    localStorage.setItem('hq_photo_'+dt, pending);
    var next = index.filter(function(e){ return e.date !== dt; });
    next.unshift({date:dt, note:note.trim()});
    saveIndex(next);
    setPending(null);
    setNote('');
    setAdding(false);
  }

  function deletePhoto(date) {
    localStorage.removeItem('hq_photo_'+date);
    saveIndex(index.filter(function(e){ return e.date !== date; }));
    setViewing(null);
  }

  function openPhoto(entry) {
    var dataUrl = localStorage.getItem('hq_photo_'+entry.date);
    if(dataUrl) setViewing({date:entry.date, dataUrl:dataUrl, note:entry.note});
  }

  var td = today();
  var lastPhotoDate = index.length > 0 ? index[0].date : null;
  var daysSincePhoto = lastPhotoDate
    ? Math.round((new Date(td+'T12:00:00') - new Date(lastPhotoDate+'T12:00:00')) / 86400000)
    : null;
  var dueThisWeek = daysSincePhoto === null || daysSincePhoto >= 7;

  // Lightbox

    return e('div', {style:{

          new Date(viewing.date+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'long',day:'numeric',year:'numeric'})
        ),
        e('div', {style:{flex:1}}),
        e('button', {
          onClick:function(){if(confirm('Delete this photo?'))deletePhoto(viewing.date);},
          style:{background:'rgba(255,100,100,0.2)',border:'1px solid rgba(255,100,100,0.4)',color:'#FDA29B',borderRadius:8,padding:'6px 12px',fontSize:12,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}
        }, 'Delete'),
        e('button', {

      e('div', {style:{marginLeft:'auto',fontSize:11,fontWeight:700,
        color:dueThisWeek?'#FF6B6B':'#10B981',

        border:'1.5px dashed #10B98160',
        color:'#10B981',fontSize:14,fontWeight:700,cursor:'pointer',fontFamily:'inherit',
        display:'flex',alignItems:'center',justifyContent:'center',gap:8,

function FoodPipelineScreen({ setTab }) {
  function getWeekKey(d) {
    var dt = d ? new Date(d) : new Date();
    dt.setHours(12,0,0,0);
    var jan4 = new Date(dt.getFullYear(),0,4);
    var w = Math.ceil((((dt-jan4)/86400000)+jan4.getDay()+1)/7);
    return dt.getFullYear()+'-W'+String(w).padStart(2,'0');
  }
  var WEEK = getWeekKey();
  var DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  var DEFAULT_STAGES = [
    { id:'plan', label:'Plan', emoji:'📋', color:'#7B2FFF', day:0,
      items:[
        {id:'p1',name:'Pick proteins for the week'},
        {id:'p2',name:'Choose veggie sides'},
        {id:'p3',name:'Pick 2 breakfasts to rotate'},
        {id:'p4',name:'Write the grocery list'},
      ]
    },
    { id:'shop', label:'Shop', emoji:'🛒', color:'#00C6FF', day:1,
      items:[
        {id:'s1',name:'Buy proteins'},
        {id:'s2',name:'Buy veggies + produce'},
        {id:'s3',name:'Buy breakfast items'},
        {id:'s4',name:'Restock pantry staples'},
      ]
    },
    { id:'prep', label:'Prep', emoji:'🥗', color:'#10B981', day:0,
      items:[
        {id:'r1',name:'Cook proteins (batch)'},
        {id:'r2',name:'Chop & roast veggies'},
        {id:'r3',name:'Portion into containers'},
        {id:'r4',name:'Prep breakfasts'},
      ]
    },
  ];

  var [data, setData] = useState(function(){ return load('foodPipeline') || {stages:DEFAULT_STAGES, weekLog:{}}; });
  var [open, setOpen] = useState(null);
  var [editingStage, setEditingStage] = useState(null);
  var [newItemText, setNewItemText] = useState('');

  function saveData(next) { setData(next); save('foodPipeline', next); }

  function isWeekDone(stageId) {
    return !!((data.weekLog||{})[WEEK+'_'+stageId]);
  }

  function toggleWeekDone(stageId) {
    var wl = Object.assign({}, data.weekLog||{});
    var key = WEEK+'_'+stageId;
    wl[key] = !wl[key];
    saveData(Object.assign({}, data, {weekLog:wl}));
  }

  function toggleItem(stageId, itemId) {
    var wl = Object.assign({}, data.weekLog||{});
    var key = WEEK+'_'+stageId+'_'+itemId;
    wl[key] = !wl[key];
    saveData(Object.assign({}, data, {weekLog:wl}));
  }

  function isItemDone(stageId, itemId) {
    return !!((data.weekLog||{})[WEEK+'_'+stageId+'_'+itemId]);
  }

  function setStageDay(stageId, day) {
    var stages = data.stages.map(function(s){ return s.id===stageId ? Object.assign({},s,{day:parseInt(day)}) : s; });
    saveData(Object.assign({}, data, {stages:stages}));
  }

  function addItem(stageId) {
    if(!newItemText.trim()) return;
    var stages = data.stages.map(function(s){
      if(s.id !== stageId) return s;
      var items = s.items.concat([{id:'u'+Date.now(), name:newItemText.trim()}]);
      return Object.assign({},s,{items:items});
    });
    saveData(Object.assign({}, data, {stages:stages}));
    setNewItemText('');
  }

  function removeItem(stageId, itemId) {
    var stages = data.stages.map(function(s){
      if(s.id !== stageId) return s;
      return Object.assign({},s,{items:s.items.filter(function(i){return i.id!==itemId;})});
    });
    saveData(Object.assign({}, data, {stages:stages}));
  }

  var stages = data.stages || DEFAULT_STAGES;
  var doneCount = stages.filter(function(s){ return isWeekDone(s.id); }).length;

  // Streak: count consecutive weeks all 3 done
  var streak = 0;
  var checkWeek = new Date(); checkWeek.setHours(12,0,0,0);
  for(var wi=0; wi<52; wi++) {
    var wk = getWeekKey(checkWeek);
    var allDone = stages.every(function(s){ return !!((data.weekLog||{})[wk+'_'+s.id]); });
    if(!allDone) break;
    streak++;
    checkWeek.setDate(checkWeek.getDate()-7);
  }

  return e('div', {className:'content'},
    e('div', {style:{display:'flex',alignItems:'center',gap:8,marginBottom:16}},
      e('button', {onClick:function(){setTab('today');}, style:{background:'none',border:'none',fontSize:22,color:MUTED,cursor:'pointer',padding:'0 4px 0 0',lineHeight:1}}, '←'),
      e('div', {style:{fontSize:20,fontWeight:800,color:TEXT}}, '🍽️ Food Pipeline'),
      streak > 0 ? e('div', {style:{marginLeft:'auto',fontSize:11,fontWeight:700,color:'#F59E0B',background:'#F59E0B15',padding:'3px 10px',borderRadius:10}}, '🔥 '+streak+'wk') : null
    ),

    // This week pipeline bar
    e('div', {style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:20}},
      ...stages.map(function(s){
        var done = isWeekDone(s.id);
        return e('div', {key:s.id,
          onClick:function(){ setOpen(open===s.id?null:s.id); },
          style:{
            borderRadius:14, padding:'14px 10px', textAlign:'center', cursor:'pointer',
            background: done ? s.color+'20' : '#fff',
            border:'1.5px solid '+(done ? s.color : BORDER),
            transition:'all 0.15s',
          }
        },
          e('div', {style:{fontSize:26, marginBottom:4}}, s.emoji),
          e('div', {style:{fontSize:12,fontWeight:800,color:done?s.color:TEXT,marginBottom:2}}, s.label),
          e('div', {style:{fontSize:10,color:MUTED}}, DAYS[s.day]),
          done ? e('div', {style:{fontSize:11,fontWeight:700,color:s.color,marginTop:4}}, '✓ done') :
                 e('div', {style:{fontSize:10,color:MUTED,marginTop:4}}, doneCount+'/3 this week')
        );
      })
    ),

    // Expanded stage
    stages.map(function(s){
      if(open !== s.id) return null;
      var allChecked = s.items.every(function(i){ return isItemDone(s.id,i.id); });
      return e('div', {key:s.id, style:{background:'#fff',borderRadius:16,border:'1.5px solid '+s.color+'40',marginBottom:16,overflow:'hidden'}},
        // Stage header
        e('div', {style:{padding:'14px 16px',borderBottom:'1px solid rgba(100,80,220,0.08)',display:'flex',alignItems:'center',gap:10}},
          e('span', {style:{fontSize:22}}, s.emoji),
          e('div', {style:{flex:1}},
            e('div', {style:{fontSize:15,fontWeight:800,color:TEXT}}, s.label+' Day'),
            e('div', {style:{fontSize:11,color:MUTED,marginTop:2}}, 'Scheduled: ',
              e('select', {
                value:s.day,
                onChange:function(ev){setStageDay(s.id,ev.target.value);},
                style:{fontSize:11,color:MUTED,border:'none',background:'transparent',cursor:'pointer',fontFamily:'inherit',fontWeight:700}
              },
                ...DAYS.map(function(d,i){ return e('option',{key:i,value:i},d); })
              )
            )
          ),
          e('button', {
            onClick:function(e2){e2.stopPropagation();toggleWeekDone(s.id);},
            style:{
              padding:'7px 14px',borderRadius:20,fontSize:11,fontWeight:700,cursor:'pointer',fontFamily:'inherit',
              background:isWeekDone(s.id)?s.color:'transparent',
              border:'1.5px solid '+s.color,
              color:isWeekDone(s.id)?'#fff':s.color,
            }
          }, isWeekDone(s.id) ? '✓ Done' : 'Mark done')
        ),

        // Checklist
        e('div', {style:{padding:'8px 16px 12px'}},
          ...s.items.map(function(item){
            var checked = isItemDone(s.id, item.id);
            return e('div', {key:item.id, style:{display:'flex',alignItems:'center',gap:10,padding:'8px 0',borderBottom:'1px solid rgba(100,80,220,0.05)'}},
              e('button', {
                onClick:function(){toggleItem(s.id,item.id);},
                style:{
                  width:22,height:22,borderRadius:6,flexShrink:0,border:'2px solid '+(checked?s.color:'#D0D0E0'),
                  background:checked?s.color:'transparent',color:'#fff',fontSize:12,fontWeight:700,
                  cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',
                }
              }, checked?'✓':''),
              e('div', {style:{flex:1,fontSize:13,fontWeight:600,color:checked?MUTED:TEXT,textDecoration:checked?'line-through':'none'}}, item.name),
              editingStage===s.id ? e('button',{onClick:function(){removeItem(s.id,item.id);},style:{background:'none',border:'none',color:'#FDA29B',fontSize:16,cursor:'pointer',padding:0,lineHeight:1}},'×') : null
            );
          }),

          // Add item / edit toggle
          editingStage===s.id ? e('div', {style:{display:'flex',gap:8,marginTop:10}},
            e('input', {
              className:'input', style:{flex:1,marginBottom:0,fontSize:13},
              placeholder:'Add item...',
              value:newItemText,
              onInput:function(ev){setNewItemText(ev.target.value);},
              onKeyDown:function(ev){if(ev.key==='Enter')addItem(s.id);},
            }),
            e('button', {onClick:function(){addItem(s.id);}, style:{padding:'8px 14px',borderRadius:10,background:s.color,border:'none',color:'#fff',fontWeight:700,cursor:'pointer',fontFamily:'inherit',fontSize:13}}, '+'),
            e('button', {onClick:function(){setEditingStage(null);setNewItemText('');}, style:{padding:'8px 14px',borderRadius:10,background:CARD2,border:'none',color:MUTED,fontWeight:700,cursor:'pointer',fontFamily:'inherit',fontSize:13}}, 'Done')
          ) : e('button', {
            onClick:function(){setEditingStage(s.id);},
            style:{marginTop:10,fontSize:12,color:MUTED,background:'none',border:'none',cursor:'pointer',fontFamily:'inherit',padding:'4px 0'}
          }, '+ Edit checklist')
        )
      );
    }),

    // Weekly history (last 6 weeks)
    e('div', {className:'card'},
      e('div', {style:{fontSize:11,fontWeight:700,letterSpacing:1.2,textTransform:'uppercase',color:MUTED,marginBottom:12}}, 'Recent Weeks'),
      e('div', {style:{display:'flex',flexDirection:'column',gap:8}},
        ...Array.from({length:6}, function(_,wi){
          var d = new Date(); d.setHours(12,0,0,0);
          d.setDate(d.getDate() - wi*7);
          var wk = getWeekKey(d);
          var label = wi===0 ? 'This week' : wi===1 ? 'Last week' : d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
          return e('div', {key:wk, style:{display:'flex',alignItems:'center',gap:8}},
            e('div', {style:{fontSize:12,color:MUTED,minWidth:70,flexShrink:0}}, label),
            e('div', {style:{display:'flex',gap:5,flex:1}},
              ...stages.map(function(s){
                var done = !!((data.weekLog||{})[wk+'_'+s.id]);
                return e('div', {key:s.id, style:{
                  flex:1, padding:'4px 0', borderRadius:6, textAlign:'center',
                  fontSize:11, fontWeight:700,
                  background: done ? s.color+'20' : '#F0F2F8',
                  color: done ? s.color : MUTED,
                }}, done ? s.emoji : '–');
              })
            )
          );
        })
      )
    ),

    e('div', {style:{height:20}})
  );
}

function App() {
  const [tab, setTab] = useState('fitness');
  const [workoutLog, setWorkoutLog] = useState(() => load('workoutLog') || {});
  const [habitLog, setHabitLog] = useState(() => load('habitLog') || {});

  useEffect(() => { syncFromSupabase(); }, []);

  const NAV = [
    {id:'fitness', icon:'💪', label:'Fitness'},
    {id:'macros', icon:'🥗', label:'Macros'},
    {id:'foodpipeline', icon:'🍽️', label:'Food'},
    {id:'photos', icon:'📸', label:'Photos'},
  ];

  function renderScreen() {
    if (tab === 'fitness') return e(FitnessScreen, {workoutLog, setWorkoutLog, habits:[], habitLog, setHabitLog, setTab});
    if (tab === 'macros') return e(MacroScreen, {setTab});
    if (tab === 'foodpipeline') return e(FoodPipelineScreen, {setTab});
    if (tab === 'photos') return e(ProgressPhotosScreen, {setTab});
    return null;
  }

  return e('div', {id:'app-inner', style:{display:'flex', flexDirection:'column', height:'100%'}},
    e('div', {className:'header'},
      e('div', {style:{fontSize:14, fontWeight:700, color:TEXT}}, 'Hi Brittanie.'),
      e('button', {
        title: 'Refresh app',
        onClick: async function() {
          if ('serviceWorker' in navigator) {
            var regs = await navigator.serviceWorker.getRegistrations();
            for (var r of regs) await r.unregister();
          }
          if ('caches' in window) {
            var keys = await caches.keys();
            for (var k of keys) await caches.delete(k);
          }
          location.reload();
        },
        style:{background:'none',border:'none',cursor:'pointer',fontSize:18,padding:'2px 4px',color:MUTED,lineHeight:1,flexShrink:0}
      }, '↺')
    ),
    e('div', {className:'content', style:{padding:0}}, renderScreen()),
    e('nav', {className:'nav'},
      ...NAV.map(n => {
        var active = tab === n.id;
        return e('button', {key:n.id, className:'nav-btn'+(active?' active':''), onClick:() => setTab(n.id)},
          e('div', {style:{fontSize:22, lineHeight:1}}, n.icon),
          n.label
        );
      })
    )
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(e(App));
