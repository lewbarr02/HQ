  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html{-webkit-text-size-adjust:100%;overflow-x:hidden;max-width:100vw;}
    body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#F7F8FC;color:#1A1833;overflow:hidden;height:100%;overflow-x:hidden;max-width:100vw;}
    #root{height:100dvh;display:flex;flex-direction:column;max-width:480px;margin:0 auto;background:#F7F8FC;overflow-x:hidden;width:100%;}
    #app-inner{max-width:100vw !important;overflow-x:hidden !important;}
    .content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px;overflow-x:hidden;max-width:100%;}
    .card{background:#fff;border:1px solid rgba(100,80,220,0.15);border-radius:18px;padding:16px;margin-bottom:12px;box-shadow:0 2px 12px rgba(100,80,220,0.06);}
    .header{padding:12px 20px;padding-top:calc(12px + env(safe-area-inset-top));background:rgba(247,248,252,0.97);border-bottom:1px solid rgba(100,80,220,0.1);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
    .nav{display:flex;background:rgba(247,248,252,0.97);border-top:1px solid rgba(100,80,220,0.1);padding:4px 0;padding-bottom:calc(6px + env(safe-area-inset-bottom));flex-shrink:0;}
    .nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;font-size:9px;font-family:inherit;font-weight:700;color:#8E8EAA;min-height:48px;justify-content:center;}
    .nav-btn.active{color:#00C6FF;}
    .nav-icon{font-size:22px;line-height:1;}
    .nav-svg{display:flex;align-items:center;justify-content:center;}
    .input{width:100%;padding:14px 16px;border-radius:12px;border:1.5px solid rgba(100,80,220,0.18);background:#F0F2F8;color:#1A1833;font-size:16px;font-family:inherit;outline:none;margin-bottom:10px;-webkit-appearance:none;display:block;}
    .input:focus{border-color:#00C6FF;background:#fff;}
    .btn-primary{padding:14px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;border:none;font-family:inherit;min-height:48px;background:linear-gradient(135deg,#00C6FF,#7B2FFF);color:white;width:100%;}
    .btn-ghost{padding:14px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;min-height:48px;background:#F0F2F8;color:#8E8EAA;border:1.5px solid rgba(100,80,220,0.18);width:100%;}
    .grad{background:linear-gradient(135deg,#00C6FF,#7B2FFF);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .habit-circle{width:58px;height:58px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;background:#F0F2F8;border:2.5px solid transparent;position:relative;transition:all 0.2s;}
    .habit-circle.done{background:white;box-shadow:0 0 0 3px rgba(0,198,255,0.15);}
    .stat-tile{background:#fff;border:1px solid rgba(100,80,220,0.1);border-radius:16px;padding:12px 6px;text-align:center;box-shadow:0 2px 8px rgba(100,80,220,0.05);}
    ::-webkit-scrollbar{display:none;}
    .splash{position:fixed;inset:0;z-index:999;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;animation:splashOut 0.5s ease 3.2s forwards;}
    .splash-logo{position:relative;display:flex;align-items:center;justify-content:center;width:200px;height:200px;}
    .splash-ring{position:absolute;border-radius:50%;border:2px solid;width:150px;height:150px;opacity:0;animation:ringExpand 1.4s ease-out forwards;}
    @keyframes ringExpand{0%{transform:scale(0.3);opacity:0.9;}100%{transform:scale(2.6);opacity:0;}}
    @keyframes splashOut{to{opacity:0;pointer-events:none;}}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
    @keyframes pop{from{transform:scale(0.4);opacity:0;}to{transform:scale(1);opacity:1;}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
    @keyframes pulse{0%,100%{box-shadow:0 0 0 3px rgba(245,158,11,0.4);}50%{box-shadow:0 0 0 7px rgba(245,158,11,0.1);}}
    .splash-logo{animation:pop 0.7s cubic-bezier(.34,1.56,.64,1) 0.3s both;}
    .splash-greeting{font-size:24px;font-weight:700;animation:fadeUp 0.5s ease 1.3s both;}
    .splash-sub{color:#8E8EAA;font-size:17px;animation:fadeUp 0.5s ease 1.6s both;}
    .tag{padding:8px 16px;border-radius:22px;font-size:13px;font-weight:700;cursor:pointer;border:1.5px solid rgba(100,80,220,0.18);background:transparent;color:#8E8EAA;font-family:inherit;}
    .tag.active{background:linear-gradient(135deg,#00C6FF,#7B2FFF);border-color:transparent;color:white;}
    .time-btn{width:44px;height:44px;border-radius:50%;border:1.5px solid rgba(100,80,220,0.18);background:#F0F2F8;color:#1A1833;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;}
    input[type=range]{-webkit-appearance:none;height:6px;border-radius:3px;outline:none;cursor:pointer;width:100%;}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,#00C6FF,#7B2FFF);cursor:pointer;}
    .priority-check{width:22px;height:22px;border-radius:50%;border:2px solid rgba(100,80,220,0.3);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:11px;flex-shrink:0;}
    .priority-check.done{background:linear-gradient(135deg,#00C6FF,#7B2FFF);border-color:transparent;color:white;}
    @media(min-width:768px){#root{max-width:none;margin:0;}}
    .sidebar{width:72px;background:#F0F2F8;border-right:1px solid rgba(100,80,220,0.1);display:flex;flex-direction:column;align-items:center;padding:16px 0;gap:2px;flex-shrink:0;}
    .sidebar-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 6px;border-radius:12px;width:60px;border:none;cursor:pointer;font-size:9px;font-family:inherit;font-weight:700;background:transparent;}
    .sidebar-btn.active{background:white;box-shadow:0 1px 6px rgba(100,80,220,0.12);}
  </style>

async function gcalGetToken() {
  var raw = localStorage.getItem('hq_calTokens');
  if (!raw) return null;
  var t; try { t = JSON.parse(raw); } catch { return null; }
  if (!t.access_token) return null;
  if (t.expiry && Date.now() > t.expiry - 5 * 60 * 1000) {
    if (!t.refresh_token) { localStorage.removeItem('hq_calTokens'); return null; }
    try {
      var r = await fetch(SUPABASE_FN + '/google-oauth', {
        method: 'POST',
        headers: {'Content-Type':'application/json','Authorization':'Bearer '+SUPABASE_ANON},
        body: JSON.stringify({action:'refresh', refresh_token: t.refresh_token}),
      });
      var d = await r.json();
      if (!d.access_token) { localStorage.removeItem('hq_calTokens'); return null; }
      t.access_token = d.access_token;
      t.expiry = Date.now() + (d.expires_in || 3600) * 1000;
      localStorage.setItem('hq_calTokens', JSON.stringify(t));
    } catch { return null; }
  }
  return t.access_token;
}

async function gcalFetchToday() {
  var token = await gcalGetToken();
  if (!token) return { error: 'no_token', events: [] };
  var now = new Date();
  var start = new Date(now.getFullYear(), now.getMonth(), now.getDate()).toISOString();
  var end = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1).toISOString();
  try {
    var r = await fetch(
      'https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=' +
      encodeURIComponent(start) + '&timeMax=' + encodeURIComponent(end) +
      '&singleEvents=true&orderBy=startTime&maxResults=20',
      { headers: { 'Authorization': 'Bearer ' + token }, cache: 'no-store' }
    );
    if (!r.ok) {
      var errBody = await r.json().catch(function(){return {};});
      return { error: 'http_' + r.status + ': ' + (errBody.error && errBody.error.message || r.statusText), events: [] };
    }
    var data = await r.json();
    var events = (data.items || []).map(function(ev) {
      var s = ev.start.dateTime || ev.start.date;
      var e2 = ev.end.dateTime || ev.end.date;
      return { id: ev.id, title: ev.summary || '(no title)', start: s, end: e2, allDay: !ev.start.dateTime };
    });
    return { error: null, events: events };
  } catch(ex) { return { error: 'exception: ' + ex.message, events: [] }; }
}

    '&scope=' + encodeURIComponent(GCAL_SCOPE) +
    '&access_type=offline' +
    '&prompt=consent';
  window.location.href = url;
}

function urlBase64ToUint8Array(base64String) {
  var padding = '='.repeat((4 - base64String.length % 4) % 4);
  var base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  var rawData = window.atob(base64);
  var outputArray = new Uint8Array(rawData.length);
  for (var i = 0; i < rawData.length; ++i) outputArray[i] = rawData.charCodeAt(i);
  return outputArray;
}

async function subscribeToPush() {
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) return {ok:false, reason:'not supported'};
  var perm = await Notification.requestPermission();
  if (perm !== 'granted') return {ok:false, reason:'denied'};
  var reg = await navigator.serviceWorker.ready;
  var existing = await reg.pushManager.getSubscription();
  if (existing) await existing.unsubscribe();
  var sub = await reg.pushManager.subscribe({
    userVisibleOnly: true,
    applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY),
  });
  var subJson = sub.toJSON();
  await _SB.from('push_subscriptions').upsert({
    user_id: 'lewis',
    endpoint: subJson.endpoint,
    p256dh: subJson.keys.p256dh,
    auth: subJson.keys.auth,
    updated_at: new Date().toISOString(),
  }, {onConflict: 'user_id'});
  return {ok:true};
}

async function unsubscribeFromPush() {
  if (!('serviceWorker' in navigator)) return;
  var reg = await navigator.serviceWorker.ready;
  var sub = await reg.pushManager.getSubscription();
  if (sub) await sub.unsubscribe();
  await _SB.from('push_subscriptions').delete().eq('user_id','lewis');
}

function useDragSort(items, onReorder) {
  var [dragIdx, setDragIdx] = React.useState(null);
  var [overIdx, setOverIdx] = React.useState(null);
  var ref = React.useRef({dragIdx: null, overIdx: null, items: items, onReorder: onReorder});
  var rowRefs = React.useRef([]);
  // Keep ref in sync with latest items/onReorder so handlers see current values
  ref.current.items = items;
  ref.current.onReorder = onReorder;

  function startDrag(idx) {
    return function(ev) {
      ev.preventDefault();
      ref.current.dragIdx = idx;
      ref.current.overIdx = idx;
      setDragIdx(idx);
      setOverIdx(idx);

      function onMove(e) {
        e.preventDefault();
        var y = e.touches[0].clientY;
        var best = ref.current.overIdx;
        rowRefs.current.forEach(function(el, i) {
          if(!el) return;
          var r = el.getBoundingClientRect();
          if(y >= r.top && y < r.bottom) best = i;
        });
        if(best !== ref.current.overIdx) {
          ref.current.overIdx = best;
          setOverIdx(best);
        }
      }
      function onEnd() {
        var di = ref.current.dragIdx;
        var oi = ref.current.overIdx;
        if(di !== null && oi !== null && di !== oi) {
          var next = ref.current.items.slice();
          var moved = next.splice(di, 1)[0];
          next.splice(oi, 0, moved);
          ref.current.onReorder(next);
        }
        ref.current.dragIdx = null;
        ref.current.overIdx = null;
        setDragIdx(null);
        setOverIdx(null);
        document.removeEventListener('touchmove', onMove);
        document.removeEventListener('touchend', onEnd);
      }
      document.addEventListener('touchmove', onMove, {passive: false});
      document.addEventListener('touchend', onEnd);
    };
  }
  function rowRef(idx) { return function(el) { rowRefs.current[idx] = el; }; }
  return { dragIdx, overIdx, startDrag, rowRef };
}

function addPassiveWin(text, date) {
  var d = date || today();
  var existing = [];
  try { existing = JSON.parse(localStorage.getItem('hq_wins_'+d)||'[]'); } catch(ex){}
  existing.push({id:'pw'+Date.now(), text:text, passive:true});
  localStorage.setItem('hq_wins_'+d, JSON.stringify(existing));
}

function takeAutoBackup() {
  var today = new Date().toISOString().slice(0,10);
  if (localStorage.getItem('hq_lastBackup') === today) return;
  var snapshot = {};
  for (var i = 0; i < localStorage.length; i++) {
    var k = localStorage.key(i);
    if (k && k.startsWith('hq_') && !k.startsWith('hq_autobackup_') && k !== 'hq_lastBackup') {
      try { snapshot[k.slice(3)] = JSON.parse(localStorage.getItem(k)); } catch(ex) {}
    }
  }
  try { localStorage.setItem('hq_autobackup_'+today, JSON.stringify({date:today, data:snapshot})); } catch(ex) {}
  localStorage.setItem('hq_lastBackup', today);
  var bks = [];
  for (var j = 0; j < localStorage.length; j++) { var bk = localStorage.key(j); if (bk && bk.startsWith('hq_autobackup_')) bks.push(bk); }
  bks.sort().reverse().slice(7).forEach(function(bk){ localStorage.removeItem(bk); });
}

async function syncFromSupabase(){
  const {data,error}=await _SB.from('hq_data').select('key,value,updated_at').eq('user_id','lewis');
  if(error||!data)return;
  data.forEach(row=>{
    // Only overwrite local if Supabase is newer
    var local = localStorage.getItem('hq_'+row.key);
    var localTs = localStorage.getItem('hq_ts_'+row.key);
    if(!localTs || new Date(row.updated_at) > new Date(localTs)){
      try{localStorage.setItem('hq_'+row.key, JSON.stringify(row.value)); localStorage.setItem('hq_ts_'+row.key, row.updated_at);}catch{}
    }
  });
}

function today(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
// Before 4 AM counts as "still last night" for evening routine purposes
function eveningDate(){const d=new Date();if(d.getHours()<4){d.setDate(d.getDate()-1);}return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function dateKey(y,m,d){return y+"-"+String(m+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");}
function getDIM(y,m){return new Date(y,m+1,0).getDate();}
function getF1(y,m){return new Date(y,m,1).getDay();}

function fmtTime(mins){if(!mins)return"0m";const h=Math.floor(mins/60),m=mins%60;if(!h)return m+"m";if(!m)return h+"h";return h+"h "+m+"m";}
function calcMorningStreak(routineLog){
  var streak = 0;
  var d = new Date();
  while(streak < 365) {
    var dk = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    if(!routineLog[dk+'_done'] || routineLog[dk+'_test']) break;
    streak++;
    d.setDate(d.getDate()-1);
  }
  return streak;
}

function calcMorningTime(routineLog, td){
  var start = routineLog[td+'_start'];
  var end = routineLog[td+'_done'];
  if(!start || !end) return null;
  // Parse times
  function parseTime(t){
    var m = t.match(/(\d+):(\d+)\s*(AM|PM)/i);
    if(!m) return 0;
    var h = parseInt(m[1]), min = parseInt(m[2]), ampm = m[3].toUpperCase();
    if(ampm==='PM' && h!==12) h+=12;
    if(ampm==='AM' && h===12) h=0;
    return h*60+min;
  }
  var diff = parseTime(end) - parseTime(start);
  if(diff < 0) diff += 24*60;
  return diff; // in minutes
}

function calcStreak(habits,log){
  var daily=habits.filter(function(h){return (h.freq||'daily')==='daily';});
  if(!daily.length)return 0;let s=0;const d=new Date();
  while(s<365){
    const dk=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
    if(!daily.some(h=>(log[dk]||{})[h.id]))break;
    s++;d.setDate(d.getDate()-1);
  }
  return s;
}
function getWeekDates(dateStr){
  var d=new Date(dateStr+'T12:00:00');
  var day=d.getDay();
  var mon=new Date(d);mon.setDate(d.getDate()-(day===0?6:day-1));
  var out=[];
  for(var i=0;i<7;i++){var x=new Date(mon);x.setDate(mon.getDate()+i);out.push(x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0'));}
  return out;
}
function isWeeklyDone(hid,dateStr,log){
  return getWeekDates(dateStr).some(function(dk){return !!(log[dk]||{})[hid];});
}
function calcWeeklyStreak(habits,log){
  var weekly=habits.filter(function(h){return h.freq==='weekly';});
  if(!weekly.length)return 0;
  var s=0;var d=new Date();
  while(s<52){
    var dk=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    if(!weekly.every(function(h){return isWeeklyDone(h.id,dk,log);}))break;
    s++;d.setDate(d.getDate()-7);
  }
  return s;
}

  function getWeekDays(dateStr) {
    var d = new Date(dateStr + 'T12:00:00');
    var dow = d.getDay();
    var monday = new Date(d);
    monday.setDate(d.getDate() - (dow === 0 ? 6 : dow - 1));
    return Array.from({length:7}, function(_,i){
      var day = new Date(monday); day.setDate(monday.getDate() + i);
      return day.getFullYear()+'-'+String(day.getMonth()+1).padStart(2,'0')+'-'+String(day.getDate()).padStart(2,'0');
    });
  }

  function getMonthGrid(dateStr) {
    var d = new Date(dateStr + 'T12:00:00');
    var year = d.getFullYear(), month = d.getMonth();
    var firstDow = new Date(year, month, 1).getDay();
    var daysInMonth = new Date(year, month+1, 0).getDate();
    var offset = firstDow === 0 ? 6 : firstDow - 1;
    var grid = Array.from({length:offset}, function(){ return null; });
    for (var i = 1; i <= daysInMonth; i++) {
      grid.push(year+'-'+String(month+1).padStart(2,'0')+'-'+String(i).padStart(2,'0'));
    }
    while (grid.length % 7 !== 0) grid.push(null);
    return grid;

    if (ev.changedTouches && ev.changedTouches.length > 0) return ev.changedTouches[0].clientY;
    return ev.clientY;
  }
  function getClientX(ev) {
    if (ev.touches && ev.touches.length > 0) return ev.touches[0].clientX;
    if (ev.changedTouches && ev.changedTouches.length > 0) return ev.changedTouches[0].clientX;
    return ev.clientX;
  }

  function handlePointerMove(ev) {
    var di = dragItemRef.current;
    if (!di) return;
    var clientY = getClientY(ev);
    var clientX = getClientX(ev);
    setGhostPos({x: clientX, y: clientY, label: di.label, color: di.color});
    if (!timelineRef.current) return;
    var rect = timelineRef.current.getBoundingClientRect();
    var y = clientY - rect.top;
    var rawMin = START_MIN + y / PX_PER_MIN;
    var snapped = Math.round(rawMin / 15) * 15;
    setDragOverMinute(Math.max(START_MIN, Math.min(END_MIN - (di.durationMin||30), snapped)));
  }

  function handlePointerEnd(ev) {
    // Remove window listeners immediately
    if (touchCleanupRef.current) { touchCleanupRef.current(); touchCleanupRef.current = null; }
    var di = dragItemRef.current;
    if (!di) return;
    var clientY = getClientY(ev);
    var clientX = getClientX(ev);
    setGhostPos(null);
    setDragOverMinute(null);
    if (!timelineRef.current) { dragItemRef.current = null; setDragItem(null); return; }
    var rect = timelineRef.current.getBoundingClientRect();
    // Only drop if released over the timeline
    if (clientX < rect.left || clientX > rect.right || clientY < rect.top || clientY > rect.bottom) {
      dragItemRef.current = null; setDragItem(null); return;
    }
    var y = clientY - rect.top;
    var rawMin = START_MIN + y / PX_PER_MIN;
    var snapped = Math.round(rawMin / 15) * 15;
    var minute = Math.max(START_MIN, Math.min(END_MIN - di.durationMin, snapped));
    var newBlock = {schedId: Date.now().toString(), id: di.id, label: di.label, color: di.color, durationMin: di.durationMin, minute: minute};
    var next = scheduled.concat([newBlock]);
    setScheduled(next);
    saveScheduledForDate(dayDate, next);
    // Auto-schedule action items that list this block in their coveredBy
    setActionItems(function(cur) {
      var changed = false;
      var updated = cur.map(function(a) {
        if (a.coveredBy && a.coveredBy.includes(di.id) && a.state === 'unplanned') {
          changed = true;
          return Object.assign({}, a, {state: 'scheduled'});
        }
        return a;
      });
      if (changed) saveActionItemsForDate(dayDate, updated);
      return changed ? updated : cur;
    });
    dragItemRef.current = null;
    setDragItem(null);
  }

  function handleDragStart(item) {
    dragItemRef.current = item;
    setDragItem(item);
    // Attach window touch listeners SYNCHRONOUSLY — before React re-renders —
    // so the very first touchmove is captured. useEffect fires too late.
    if (touchCleanupRef.current) touchCleanupRef.current();
    function onMove(ev) { ev.preventDefault(); handlePointerMove(ev); }
    function onEnd(ev) { handlePointerEnd(ev); }
    window.addEventListener('touchmove', onMove, {passive: false});
    window.addEventListener('touchend', onEnd);
    touchCleanupRef.current = function() {
      window.removeEventListener('touchmove', onMove);
      window.removeEventListener('touchend', onEnd);
    };
  }

  function handleDrop(ev) { ev.preventDefault(); handlePointerEnd(ev); }

  function exportICS() {

    }
    var events = [];
    // Logged morning routine
    if (mStartMin) events.push({summary:'☀️ Morning Routine', start:mStartMin, end:mDoneMin||mStartMin+30});
    // Logged evening routine
    if (eStartMin) events.push({summary:'🌙 Evening Routine', start:eStartMin, end:eDoneMin||eStartMin+30});
    // Timed priorities
    todayPriorities.forEach(function(p) {
      var min = parseTimeToMin(p.time);
      if (min) events.push({summary:p.name, start:min, end:min+45});
    });
    // Dragged/scheduled blocks
    scheduled.forEach(function(s) {
      events.push({summary:s.label, start:s.minute, end:s.minute+s.durationMin});
    });
    if (events.length === 0) { alert('No scheduled events to export yet.'); return; }
    var lines = ['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//HQ//Lewis Schedule//EN','CALSCALE:GREGORIAN'];
    events.forEach(function(ev) {
      lines.push('BEGIN:VEVENT');
      lines.push('DTSTART:' + toICSTime(ev.start));
      lines.push('DTEND:' + toICSTime(ev.end));
      lines.push('SUMMARY:' + ev.summary);
      lines.push('END:VEVENT');
    });
    lines.push('END:VCALENDAR');
    var blob = new Blob([lines.join('\r\n')], {type:'text/calendar'});
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'lewis-schedule-' + td + '.ics';
    a.click();
  }

function FlowStateCard({flowLog, setFlowLog, routineLog, flowModal, setFlowModal}) {
  const td = today();
  const sessions = flowLog || [];
  const activeSession = sessions.find(function(s){return !s.endTime;});
  const [showHistory, setShowHistory] = useState(false);
  const [endStep, setEndStep] = useState(null); // null | 'rating'

  var medsISO = routineLog && routineLog[td+'_itemTimes'] && routineLog[td+'_itemTimes']['m2'];
  var medsLabel = medsISO ? new Date(medsISO).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}) : null;

  function fmtDuration(ms) {
    var m = Math.floor(ms/60000);
    if(m < 60) return m+'m';
    return Math.floor(m/60)+'h '+(m%60)+'m';
  }

  function enterFlow() {
    if (typeof Notification !== 'undefined' && Notification.requestPermission) Notification.requestPermission();
    var s = {id: Date.now().toString(), date: td, startTime: new Date().toISOString(), endTime: null, checkIns: [], endQuality: null};
    var next = [...sessions, s];
    setFlowLog(next); save('flowLog', next);
  }

  function exitFlow(quality) {
    var endTime = new Date().toISOString();
    var next = sessions.map(function(s){
      return s.endTime ? s : Object.assign({}, s, {endTime: endTime, endQuality: quality || null});
    });
    setFlowLog(next); save('flowLog', next);
    setEndStep(null);
  }

  function medsOffset(session) {
    var itemTimes = routineLog && routineLog[session.date+'_itemTimes'];
    if(!itemTimes || !itemTimes['m2']) return null;
    var diff = new Date(session.startTime) - new Date(itemTimes['m2']);
    if(diff < 0) return null;
    return fmtDuration(diff) + ' after meds';
  }

  var activeDuration = activeSession ? fmtDuration(Date.now() - new Date(activeSession.startTime).getTime()) : null;
  var lastIntensity = activeSession && activeSession.checkIns.length > 0 ? activeSession.checkIns[activeSession.checkIns.length-1].intensity : null;
  var pastSessions = sessions.filter(function(s){return !!s.endTime;}).slice(-30).reverse();

  var FLOW_COLOR = '#F59E0B';
  var FLOW_BG = 'rgba(245,158,11,0.08)';
  var QUALITY_OPTS = [{n:1,e:'😐'},{n:2,e:'🙂'},{n:3,e:'⚡'},{n:4,e:'🔥'},{n:5,e:'🚀'}];

  if(showHistory) {
    // Aggregate stats across all completed sessions
    var completedWithMeds = pastSessions.filter(function(s){ return medsOffset(s); });
    var avgLagMs = completedWithMeds.length > 0 ? completedWithMeds.reduce(function(acc,s){
      var meds = new Date(routineLog[s.date+'_itemTimes']['m2']);
      return acc + (new Date(s.startTime) - meds);
    }, 0) / completedWithMeds.length : null;
    var durMs = pastSessions.map(function(s){return new Date(s.endTime)-new Date(s.startTime);});
    var avgDurMs = durMs.length > 0 ? durMs.reduce(function(a,b){return a+b;},0)/durMs.length : null;
    var allInts = pastSessions.flatMap(function(s){return s.checkIns.map(function(c){return c.intensity;});});
    var avgPeakInt = pastSessions.length > 0 ? (function(){
      var peaks = pastSessions.map(function(s){return s.checkIns.length>0?Math.max.apply(null,s.checkIns.map(function(c){return c.intensity;})):null;}).filter(Boolean);
      return peaks.length > 0 ? (peaks.reduce(function(a,b){return a+b;},0)/peaks.length).toFixed(1) : null;
    })() : null;

    return e('div', {className:'card', style:{marginBottom:12}},
      e('div', {style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}},
        e('div', {style:{fontSize:11,fontWeight:700,letterSpacing:1.2,textTransform:'uppercase',color:MUTED}}, '⚡ Flow State History'),
        e('button', {onClick:()=>setShowHistory(false), style:{fontSize:12,color:MUTED,background:'none',border:'none',cursor:'pointer',fontFamily:'inherit'}}, '← Back')
      ),
      pastSessions.length >= 3 ? e('div', {style:{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:16,padding:'12px',background:FLOW_BG,borderRadius:12}},
        avgLagMs ? e('div', {style:{textAlign:'center'}}, e('div',{style:{fontSize:16,fontWeight:800,color:FLOW_COLOR}}, fmtDuration(avgLagMs)), e('div',{style:{fontSize:9,color:MUTED,marginTop:2}}, 'AVG MEDS → FLOW')) : null,
        avgDurMs ? e('div', {style:{textAlign:'center'}}, e('div',{style:{fontSize:16,fontWeight:800,color:FLOW_COLOR}}, fmtDuration(avgDurMs)), e('div',{style:{fontSize:9,color:MUTED,marginTop:2}}, 'AVG DURATION')) : null,
        avgPeakInt ? e('div', {style:{textAlign:'center'}}, e('div',{style:{fontSize:16,fontWeight:800,color:FLOW_COLOR}}, avgPeakInt+' / 5'), e('div',{style:{fontSize:9,color:MUTED,marginTop:2}}, 'AVG PEAK INTENSITY')) : null
      ) : null,
      pastSessions.length === 0 ? e('div', {style:{fontSize:13,color:MUTED,textAlign:'center',padding:'16px 0'}}, 'No sessions logged yet') :
      e('div', {},
        pastSessions.map(function(s) {
          var dur = fmtDuration(new Date(s.endTime) - new Date(s.startTime));
          var start = new Date(s.startTime).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
          var end = new Date(s.endTime).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
          var offset = medsOffset(s);
          var peakInt = s.checkIns.length > 0 ? Math.max.apply(null,s.checkIns.map(function(c){return c.intensity;})) : null;
          var qualE = s.endQuality ? QUALITY_OPTS.find(function(q){return q.n===s.endQuality;}) : null;
          return e('div', {key:s.id, style:{padding:'10px 0',borderBottom:'1px solid rgba(100,80,220,0.07)'}},
            e('div', {style:{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:3}},
              e('div', {style:{fontSize:13,fontWeight:700,color:TEXT}}, s.date === td ? 'Today' : new Date(s.date+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})),
              e('div', {style:{display:'flex',alignItems:'center',gap:8}},
                qualE ? e('span',{style:{fontSize:14}}, qualE.e) : null,
                e('div', {style:{fontSize:13,fontWeight:800,color:FLOW_COLOR}}, '⚡ '+dur)
              )
            ),
            e('div', {style:{fontSize:11,color:MUTED}},
              start+' – '+end +
              (offset ? '  ·  '+offset : '') +
              (peakInt ? '  ·  peak '+peakInt+'/5' : '')
            )
          );
        })
      )
    );
  }

  if(activeSession) {
    if(endStep === 'rating') {
      return e('div', {className:'card', style:{marginBottom:12,border:'1.5px solid '+FLOW_COLOR+'50',background:FLOW_BG}},
        e('div', {style:{fontSize:15,fontWeight:800,color:TEXT,marginBottom:6,textAlign:'center'}}, 'How was that session overall?'),
        e('div', {style:{fontSize:12,color:MUTED,marginBottom:16,textAlign:'center'}}, 'Overall quality, not just peak — the whole ride.'),
        e('div', {style:{display:'flex',gap:8,justifyContent:'center',marginBottom:16}},
          ...QUALITY_OPTS.map(function(q){
            return e('button', {key:q.n, onClick:()=>exitFlow(q.n), style:{
              width:52,height:52,borderRadius:14,border:'1.5px solid '+FLOW_COLOR+'40',
              background:'rgba(245,158,11,0.06)',fontSize:24,cursor:'pointer',fontFamily:'inherit',
              display:'flex',alignItems:'center',justifyContent:'center',
            }}, q.e);
          })
        ),
        e('button', {onClick:()=>exitFlow(null), style:{fontSize:11,color:MUTED,background:'none',border:'none',cursor:'pointer',fontFamily:'inherit',display:'block',margin:'0 auto'}}, 'Skip rating')
      );
    }
    return e('div', {className:'card', style:{marginBottom:12,border:'1.5px solid '+FLOW_COLOR+'50',background:FLOW_BG}},
      e('div', {style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}},
        e('div', {style:{display:'flex',alignItems:'center',gap:8}},
          e('div', {style:{width:10,height:10,borderRadius:'50%',background:FLOW_COLOR,boxShadow:'0 0 0 3px '+FLOW_COLOR+'40',animation:'pulse 1.5s infinite'}}),
          e('div', {style:{fontSize:11,fontWeight:700,letterSpacing:1.2,textTransform:'uppercase',color:FLOW_COLOR}}, 'Flow State Active')
        ),
        e('button', {onClick:()=>setShowHistory(true), style:{fontSize:11,color:MUTED,background:'none',border:'none',cursor:'pointer',fontFamily:'inherit'}}, 'History')
      ),
      e('div', {style:{display:'flex',gap:16,marginBottom:12}},
        e('div', {}, e('div', {style:{fontSize:24,fontWeight:800,color:TEXT,lineHeight:1}}, activeDuration), e('div', {style:{fontSize:10,color:MUTED,marginTop:2}}, 'duration')),
        activeSession.checkIns.length > 0 ? e('div', {}, e('div', {style:{fontSize:24,fontWeight:800,color:FLOW_COLOR,lineHeight:1}}, ['','⚡','⚡⚡','⚡⚡⚡','⚡⚡⚡⚡','⚡⚡⚡⚡⚡'][lastIntensity]||lastIntensity), e('div', {style:{fontSize:10,color:MUTED,marginTop:2}}, 'last intensity')) : null,
        medsLabel ? e('div', {}, e('div', {style:{fontSize:13,fontWeight:700,color:TEXT,lineHeight:1,marginTop:4}}, medsLabel), e('div', {style:{fontSize:10,color:MUTED,marginTop:2}}, 'meds taken')) : null
      ),
      e('button', {onClick:()=>setEndStep('rating'), style:{width:'100%',padding:'10px',borderRadius:12,border:'none',background:'rgba(245,158,11,0.15)',color:FLOW_COLOR,fontWeight:700,fontSize:14,cursor:'pointer',fontFamily:'inherit'}}, '✓ End Flow State')
    );
  }

  return e('div', {className:'card', style:{marginBottom:12}},
    e('div', {style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}},
      e('div', {style:{fontSize:11,fontWeight:700,letterSpacing:1.2,textTransform:'uppercase',color:MUTED}}, '⚡ Flow State'),
      e('button', {onClick:()=>setShowHistory(true), style:{fontSize:11,color:MUTED,background:'none',border:'none',cursor:'pointer',fontFamily:'inherit'}}, 'History')
    ),
    medsLabel ? e('div', {style:{fontSize:12,color:MUTED,marginBottom:10}}, '💊 Meds taken at '+medsLabel) : null,
    e('button', {onClick:enterFlow, style:{
      width:'100%', padding:'14px', borderRadius:14,
      border:'2px solid '+FLOW_COLOR+'60',
      background:'linear-gradient(135deg,rgba(245,158,11,0.08),rgba(245,158,11,0.03))',
      color:FLOW_COLOR, fontWeight:800, fontSize:16, cursor:'pointer', fontFamily:'inherit',
      display:'flex', alignItems:'center', justifyContent:'center', gap:8,
    }}, '⚡ Enter Flow State')
  );
}

function QuickShoppingCard({groceries, setGroceries, returns, setReturns, setTab}) {

  var [retStore, setRetStore] = React.useState('');
  var [retDeadline, setRetDeadline] = React.useState('');
  var inputRef = React.useRef(null);

  var pendingReturns = (returns||[]).filter(function(r){return !r.done;});

  function addToList(listId) {
    var text = input.trim();
    if(!text) return;
    var next = [...(groceries||[]), {id: Date.now().toString(), name: text, list: listId, done: false}];
    setGroceries(next); save('groceries', next);
    setInput('');
    var label = SHOP_LISTS.find(function(l){return l.id===listId;}).label;

    var next = [...(returns||[]), {id:Date.now().toString(), item:retItem.trim(), store:retStore.trim(), deadline:retDeadline, done:false}];
    setReturns(next); save('returns', next);
    setRetItem(''); setRetStore(''); setRetDeadline(''); setAddingReturn(false);
  }

  function markReturnDone(id) {
    var ret = (returns||[]).find(function(r){return r.id===id;});
    var next = (returns||[]).map(function(r){return r.id===id?Object.assign({},r,{done:true}):r;});
    setReturns(next); save('returns', next);
    if(ret) addPassiveWin('Returned: '+ret.item+(ret.store?' to '+ret.store:''));
  }

  function daysLeft(dl) {
    if(!dl) return null;
    return Math.ceil((new Date(dl+'T23:59:59')-new Date())/86400000);
  }

  return e('div', {style:{background:'#fff',border:'1px solid rgba(255,107,157,0.3)',borderRadius:18,padding:14,marginBottom:12,position:'relative'}},
    sent ? e('div', {style:{position:'absolute',inset:0,borderRadius:18,background:'rgba(255,255,255,0.95)',zIndex:5,display:'flex',alignItems:'center',justifyContent:'center',gap:8,fontSize:14,fontWeight:700,color:TEXT}},
      '✓ Added to ', e('span', {style:{color:'#FF6B9D'}}, sent)
    ) : null,

    // Header row
    e('div', {style:{display:'flex',alignItems:'center',marginBottom:10}},
      e('div', {style:{fontSize:11,fontWeight:700,letterSpacing:1.2,textTransform:'uppercase',color:MUTED,flex:1}}, '🛒 Shopping'),
      pendingReturns.length > 0 ? e('button', {
        onClick:function(){setTab('grocery');},
        style:{display:'flex',alignItems:'center',gap:5,padding:'3px 8px',borderRadius:20,background:'#EF444415',border:'1.5px solid #EF444440',cursor:'pointer',fontFamily:'inherit'}
      },
        e('span', {style:{fontSize:10,fontWeight:800,color:'#EF4444'}}, '📦 '+pendingReturns.length+' to return')
      ) : null
    ),

    // Quick-add return form
    addingReturn ? e('div', {style:{background:'#FEF2F2',borderRadius:14,padding:12,marginBottom:10,border:'1.5px solid #FCA5A5'}},
      e('div', {style:{fontSize:12,fontWeight:700,color:'#EF4444',marginBottom:8}}, '📦 Add Return'),
      e('input', {className:'input',placeholder:'Item to return',value:retItem,onInput:function(ev){setRetItem(ev.target.value);},style:{marginBottom:6,fontSize:13}}),
      e('input', {className:'input',placeholder:'Store (optional)',value:retStore,onInput:function(ev){setRetStore(ev.target.value);},style:{marginBottom:6,fontSize:13}}),
      e('input', {type:'date',value:retDeadline,onChange:function(ev){setRetDeadline(ev.target.value);},style:{width:'100%',padding:'8px 12px',borderRadius:10,border:'1.5px solid #FCA5A5',fontSize:13,fontFamily:'inherit',background:'#fff',color:TEXT,boxSizing:'border-box',marginBottom:8}}),
      e('div', {style:{display:'flex',gap:6}},
        e('button', {onClick:saveReturn,style:{flex:1,padding:'9px',borderRadius:10,border:'none',background:'#EF4444',color:'white',fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}, 'Save'),
        e('button', {onClick:function(){setAddingReturn(false);setRetItem('');setRetStore('');setRetDeadline('');},style:{padding:'9px 14px',borderRadius:10,border:'1.5px solid #FCA5A5',background:'none',color:'#EF4444',fontSize:13,cursor:'pointer',fontFamily:'inherit'}}, 'Cancel')
      )
    ) : null,

    // Pending returns list (compact)
    pendingReturns.length > 0 && !addingReturn ? e('div', {style:{marginBottom:10}},
      ...pendingReturns.map(function(r){
        var dl = daysLeft(r.deadline);
        var urgent = dl !== null && dl <= 3;
        var dlLabel = dl === null ? '' : dl < 0 ? ' · OVERDUE' : dl === 0 ? ' · Today!' : dl === 1 ? ' · Tomorrow' : ' · '+dl+'d left';
        return e('div', {key:r.id, style:{display:'flex',alignItems:'center',gap:8,padding:'7px 10px',borderRadius:10,background:urgent?'#FEF2F2':'#FFF7ED',border:'1px solid '+(urgent?'#FCA5A5':'#FCD34D'),marginBottom:5}},
          e('span', {style:{fontSize:13,flex:1,fontWeight:600,color:TEXT,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}, r.item+(r.store?' · '+r.store:'')),
          r.deadline ? e('span', {style:{fontSize:11,fontWeight:700,color:urgent?'#EF4444':'#D97706',flexShrink:0}}, dlLabel) : null,
          e('button', {onClick:function(){markReturnDone(r.id);},style:{background:'none',border:'none',fontSize:16,cursor:'pointer',padding:'0 2px',lineHeight:1,flexShrink:0}}, '✓')
        );
      })
    ) : null,

    // Shopping input
    e('input', {
      ref: inputRef,
      value: input,
      onChange: function(ev){setInput(ev.target.value);},
      onKeyDown: function(ev){if(ev.key==='Enter' && input.trim()) addToList('mine');},
      placeholder: 'Need something? Jot it down…',
      style:{width:'100%',padding:'10px 14px',borderRadius:12,border:'1.5px solid '+(input?'#FF6B9D60':BORDER),background:CARD2,fontSize:14,fontFamily:'inherit',outline:'none',boxSizing:'border-box',marginBottom:10}
    }),
    e('div', {style:{display:'flex',gap:8}},
      ...SHOP_LISTS.map(function(l){
        var count = (groceries||[]).filter(function(g){return (g.list||'wife')===l.id && !g.done;}).length;
        var active = input.trim();
        return e('button', {key:l.id, onClick:function(){addToList(l.id);},
          style:{flex:1,padding:'9px 4px',borderRadius:12,border:'1.5px solid '+(active?l.color+'60':BORDER),background:active?l.color+'12':CARD2,color:active?l.color:MUTED,fontWeight:700,fontSize:12,cursor:active?'pointer':'default',fontFamily:'inherit',transition:'all 0.15s',position:'relative'}},
          l.emoji + ' ' + l.label,
          count > 0 ? e('span', {style:{position:'absolute',top:-6,right:-4,minWidth:17,height:17,borderRadius:9,background:l.color,color:'white',fontSize:10,fontWeight:800,display:'flex',alignItems:'center',justifyContent:'center',lineHeight:1,padding:'0 3px',boxShadow:'0 1px 4px rgba(0,0,0,0.18)'}}, count) : null
        );
      })
    )
  );
}

function HQBacklogScreen({hqBacklog, setHqBacklog, setTab}) {
  var [newItem, setNewItem] = React.useState('');
  var [filter, setFilter] = React.useState('open'); // 'open' | 'done' | 'all'
  var items = (hqBacklog || []).slice().reverse();
  var filtered = items.filter(function(i){ return filter==='all' ? true : filter==='done' ? i.done : !i.done; });

  function addItem() {
    var text = newItem.trim();
    if (!text) return;
    var next = [{id:'hqb'+Date.now(), text:text, added:today(), done:false}, ...(hqBacklog||[])];
    setHqBacklog(next); save('hqBacklog', next);
    setNewItem('');
  }

  function toggleDone(id) {
    var item = (hqBacklog||[]).find(function(i){ return i.id===id; });
    var next = (hqBacklog||[]).map(function(i){ return i.id===id ? {...i, done:!i.done} : i; });
    setHqBacklog(next); save('hqBacklog', next);
    if(item && !item.done) addPassiveWin('HQ update shipped: '+item.text);
  }

  function deleteItem(id) {
    var next = (hqBacklog||[]).filter(function(i){ return i.id!==id; });
    setHqBacklog(next); save('hqBacklog', next);
  }

  var openCount = (hqBacklog||[]).filter(function(i){return !i.done;}).length;
  var doneCount = (hqBacklog||[]).filter(function(i){return i.done;}).length;

  return e('div', {className:'content'},
    e('div', {style:{display:'flex',alignItems:'center',gap:12,marginBottom:20}},
      e('button', {onClick:function(){setTab('today');}, style:{background:'none',border:'none',fontSize:20,cursor:'pointer',padding:0,lineHeight:1}}, '←'),
      e('div', {style:{fontSize:20,fontWeight:800}}, '🛠️ HQ Backlog'),
      e('div', {style:{fontSize:12,fontWeight:700,color:ACCENT,background:ACCENT+'18',borderRadius:8,padding:'2px 8px'}}, openCount + ' open')
    ),
    e('div', {className:'card'},
      e('div', {style:{display:'flex',gap:8}},
        e('input', {
          value: newItem,
          onChange: function(ev){ setNewItem(ev.target.value); },
          onKeyDown: function(ev){ if(ev.key==='Enter') addItem(); },
          placeholder: 'Add a feature idea…',
          style:{flex:1,padding:'10px 14px',borderRadius:12,border:'1.5px solid '+(newItem?ACCENT+'60':BORDER),background:CARD2,fontSize:14,fontFamily:'inherit',outline:'none'}
        }),
        e('button', {onClick:addItem, style:{padding:'10px 16px',borderRadius:12,background:newItem.trim()?'linear-gradient(135deg,'+ACCENT+','+PURPLE+')':'#E8E8F0',border:'none',color:newItem.trim()?'white':MUTED,fontSize:16,cursor:newItem.trim()?'pointer':'default',fontFamily:'inherit'}}, '+')
      )
    ),
    e('div', {style:{display:'flex',gap:6,marginBottom:12}},
      ['open','done','all'].map(function(f){
        var labels = {open:'Open ('+openCount+')', done:'Done ('+doneCount+')', all:'All'};
        return e('button', {key:f, onClick:function(){setFilter(f);}, style:{flex:1,padding:'7px 0',borderRadius:10,border:'none',background:filter===f?ACCENT:'#E8E8F0',color:filter===f?'white':MUTED,fontWeight:700,fontSize:12,cursor:'pointer',fontFamily:'inherit'}}, labels[f]);
      })
    ),
    filtered.length === 0
      ? e('div', {style:{textAlign:'center',color:MUTED,padding:'32px 0',fontSize:14}}, filter==='open' ? 'No open ideas — nice!' : 'Nothing here yet.')
      : e('div', {style:{display:'flex',flexDirection:'column',gap:8}},
          ...filtered.map(function(item){
            return e('div', {key:item.id, style:{display:'flex',alignItems:'flex-start',gap:10,padding:'12px 14px',background:'#fff',borderRadius:14,border:'1px solid '+BORDER,opacity:item.done?0.55:1}},
              e('button', {onClick:function(){toggleDone(item.id);}, style:{marginTop:1,flexShrink:0,width:20,height:20,borderRadius:6,border:'2px solid '+(item.done?ACCENT:BORDER),background:item.done?ACCENT:'transparent',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,color:'white'}}, item.done?'✓':''),
              e('div', {style:{flex:1}},
                e('div', {style:{fontSize:13,fontWeight:600,color:TEXT,textDecoration:item.done?'line-through':'none',lineHeight:1.5}}, item.text),
                e('div', {style:{fontSize:10,color:MUTED,marginTop:2}}, item.added || '')
              ),
              e('button', {onClick:function(){deleteItem(item.id);}, style:{background:'none',border:'none',fontSize:14,color:MUTED,cursor:'pointer',padding:'0 2px',lineHeight:1}}, '×')
            );
          })
        )
  );
}

function QuickIdeasCard({ideaLog, setIdeaLog, groceries, setGroceries, notes, setNotes, projects, setProjects, backlog, setBacklog, hqBacklog, setHqBacklog}) {
  var td = today();
  var [input, setInput] = React.useState('');
  var [expanded, setExpanded] = React.useState(false);
  var [sortingIdea, setSortingIdea] = React.useState(null);
  var [pickingProject, setPickingProject] = React.useState(false);
  var [sentFlash, setSentFlash] = React.useState(null); // {text, dest}
  var inputRef = React.useRef(null);

  var allIdeas = (ideaLog || []).slice().reverse();
  var unsortedCount = allIdeas.filter(function(i){ return !i.sorted; }).length;

  function addIdea() {
    var text = input.trim();
    if(!text) return;
    var idea = {id: 'idea'+Date.now(), text: text, date: td, time: new Date().toISOString()};
    var next = [idea, ...(ideaLog || [])];
    setIdeaLog(next);
    save('ideaLog', next);
    setInput('');
    setExpanded(true);
    _SB.from('ideas').insert({id: idea.id, text: idea.text, date: idea.date, time: idea.time}).then(function(){});
  }

  function deleteIdea(id) {
    var next = (ideaLog || []).filter(function(i){ return i.id !== id; });
    setIdeaLog(next);
    save('ideaLog', next);
    _SB.from('ideas').delete().eq('id', id).then(function(){});
  }

  function discussIdea(idea) {
    var prompt = 'I had an idea I want to think through with you:\n\n"' + idea.text + '"\n\nHelp me develop this idea.';
    try { navigator.clipboard.writeText(prompt); } catch(e){}
    window.open('https://claude.ai/new', '_blank');
  }

  var [pickingGrocery, setPickingGrocery] = React.useState(false);
  var [editingIdea, setEditingIdea] = React.useState(null); // id of idea being edited
  var [editDraft, setEditDraft] = React.useState('');

  function saveEdit(id) {
    if (!editDraft.trim()) return;
    var next = (ideaLog || []).map(function(i){ return i.id === id ? Object.assign({}, i, {text: editDraft.trim()}) : i; });
    setIdeaLog(next); save('ideaLog', next);
    setEditingIdea(null);
  }

  function fileIdea(idea, dest, subId) {
    var text = idea.text;
    if(dest === 'todo') {
      var existing = load('priorities') || [];
      save('priorities', [...existing, {id: Date.now().toString(), name: text, cat: 'Personal', time: '', done: false, color: MUTED}]);
    } else if(dest === 'grocery-wife' || dest === 'grocery-mine' || dest === 'grocery-amazon') {
      var listKey = dest.replace('grocery-', '');
      var next = [...(groceries||[]), {id: Date.now().toString(), name: text, list: listKey, done: false}];
      setGroceries(next); save('groceries', next);
    } else if(dest === 'later') {
      var next = [...(backlog||[]), {id: Date.now().toString(), text: text, added: td}];
      setBacklog(next); save('backlog', next);
    } else if(dest === 'hqbacklog') {
      var next = [{id:'hqb'+Date.now(), text: text, added: td, done: false}, ...(hqBacklog||[])];
      setHqBacklog(next); save('hqBacklog', next);
    } else if(dest === 'note') {
      var next = [...(notes||[]), {id: Date.now().toString(), text: text, color: 0, created: td}];
      setNotes(next); save('notes', next);
    } else if(dest === 'project' && subId) {
      var next = (projects||[]).map(function(p){
        return p.id === subId ? {...p, tasks: [...(p.tasks||[]), {id: Date.now().toString(), text: text, done: false}]} : p;
      });
      setProjects(next); save('projects', next);
    }
    var destLabels = {'todo':"Today's To-Do",'later':'Do It Later','grocery-wife':'Wife List','grocery-mine':'My List','grocery-amazon':'Amazon','note':'Notes','project':'Project','hqbacklog':'HQ Backlog'};
    setSentFlash({text: text, dest: destLabels[dest] || dest});
    setTimeout(function(){ setSentFlash(null); }, 2200);
    deleteIdea(idea.id);
    setSortingIdea(null);
    setPickingProject(false);
    setPickingGrocery(false);
  }

  var SORT_DESTS = [
    {id:'todo',       icon:'✅', label:"Today's To-Do"},
    {id:'later',      icon:'⏳', label:'Do It Later'},
    {id:'hqbacklog',  icon:'🛠️', label:'HQ Backlog'},
    {id:'project',    icon:'📁', label:'Project Task →'},
    {id:'grocery',    icon:'🛒', label:'Shopping →'},
    {id:'note',       icon:'📝', label:'Notes'},
  ];

  return e('div', {style:{background:'#fff',border:'1px solid '+IDEA_ACCENT+'40',borderRadius:18,padding:14,marginBottom:12,position:'relative'}},
    sentFlash ? e('div', {style:{position:'absolute',top:0,left:0,right:0,bottom:0,borderRadius:18,background:'rgba(255,255,255,0.96)',zIndex:10,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:6}},
      e('div', {style:{fontSize:26}}, '✓'),
      e('div', {style:{fontSize:13,fontWeight:700,color:TEXT}}, 'Sent to ' + sentFlash.dest)
    ) : null,
    sortingIdea ? e('div', {style:{position:'absolute',top:0,left:0,right:0,bottom:0,borderRadius:18,background:'rgba(255,255,255,0.97)',zIndex:10,padding:16,display:'flex',flexDirection:'column',gap:10}},
      e('div', {style:{fontSize:12,fontWeight:700,color:MUTED,marginBottom:2}}, 'SEND TO…'),
      e('div', {style:{fontSize:13,color:TEXT,fontWeight:600,marginBottom:4,lineHeight:1.4}}, '"' + sortingIdea.text + '"'),
      pickingProject
        ? e('div', {style:{display:'flex',flexDirection:'column',gap:8}},
            e('div', {style:{fontSize:11,fontWeight:700,color:MUTED}}, 'PICK A PROJECT'),
            ...(projects||[]).filter(function(p){return !p.done;}).map(function(p){
              return e('button', {key:p.id, onClick:function(){ fileIdea(sortingIdea,'project',p.id); },
                style:{padding:'10px 14px',borderRadius:12,background:CARD2,border:'1px solid '+BORDER,fontSize:13,fontWeight:600,color:TEXT,cursor:'pointer',textAlign:'left',fontFamily:'inherit'}},
                p.title);
            }),
            (projects||[]).filter(function(p){return !p.done;}).length === 0
              ? e('div', {style:{fontSize:13,color:MUTED}}, 'No projects yet — add one in Goals tab')
              : null,
            e('button', {onClick:function(){ setPickingProject(false); }, style:{marginTop:4,background:'none',border:'none',color:MUTED,fontSize:12,cursor:'pointer',fontFamily:'inherit'}}, '← Back')
          )
        : pickingGrocery
        ? e('div', {style:{display:'flex',flexDirection:'column',gap:8}},
            e('div', {style:{fontSize:11,fontWeight:700,color:MUTED}}, 'WHICH LIST?'),
            e('button', {onClick:function(){ fileIdea(sortingIdea,'grocery-wife'); }, style:{padding:'10px 14px',borderRadius:12,background:CARD2,border:'1px solid '+BORDER,fontSize:13,fontWeight:600,color:TEXT,cursor:'pointer',textAlign:'left',fontFamily:'inherit',display:'flex',alignItems:'center',gap:10}}, e('span',{},'💌'), 'Wife List'),
            e('button', {onClick:function(){ fileIdea(sortingIdea,'grocery-mine'); }, style:{padding:'10px 14px',borderRadius:12,background:CARD2,border:'1px solid '+BORDER,fontSize:13,fontWeight:600,color:TEXT,cursor:'pointer',textAlign:'left',fontFamily:'inherit',display:'flex',alignItems:'center',gap:10}}, e('span',{},'🚶'), 'My List'),
            e('button', {onClick:function(){ fileIdea(sortingIdea,'grocery-amazon'); }, style:{padding:'10px 14px',borderRadius:12,background:CARD2,border:'1px solid '+BORDER,fontSize:13,fontWeight:600,color:TEXT,cursor:'pointer',textAlign:'left',fontFamily:'inherit',display:'flex',alignItems:'center',gap:10}}, e('span',{},'📦'), 'Amazon'),
            e('button', {onClick:function(){ setPickingGrocery(false); }, style:{marginTop:4,background:'none',border:'none',color:MUTED,fontSize:12,cursor:'pointer',fontFamily:'inherit'}}, '← Back')
          )
        : e('div', {style:{display:'flex',flexDirection:'column',gap:8}},
            ...SORT_DESTS.map(function(d){
              return e('button', {key:d.id, onClick:function(){
                  if(d.id==='project'){ setPickingProject(true); }
                  else if(d.id==='grocery'){ setPickingGrocery(true); }
                  else { fileIdea(sortingIdea, d.id); }
                },
                style:{padding:'10px 14px',borderRadius:12,background:CARD2,border:'1px solid '+BORDER,fontSize:13,fontWeight:600,color:TEXT,cursor:'pointer',textAlign:'left',fontFamily:'inherit',display:'flex',alignItems:'center',gap:10}},
                e('span', {}, d.icon), d.label);
            }),
            e('button', {onClick:function(){ setSortingIdea(null); setPickingProject(false); setPickingGrocery(false); }, style:{marginTop:4,background:'none',border:'none',color:MUTED,fontSize:12,cursor:'pointer',fontFamily:'inherit'}}, 'Cancel')
          )
    ) : null,
    e('div', {style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}},
      e('div', {style:{display:'flex',alignItems:'center',gap:8}},
        e('div', {style:{fontSize:11,fontWeight:700,letterSpacing:1.2,textTransform:'uppercase',color:MUTED}}, '💡 Quick Ideas'),
        unsortedCount > 0 ? e('div', {style:{fontSize:11,fontWeight:800,color:'#F97316',background:'#F9731618',borderRadius:8,padding:'2px 7px'}}, unsortedCount + ' to sort') : null
      ),
      allIdeas.length > 0 ? e('button', {onClick:function(){ setExpanded(!expanded); }, style:{fontSize:11,fontWeight:700,color:MUTED,background:'none',border:'none',cursor:'pointer',fontFamily:'inherit'}}, expanded ? 'Hide ↑' : 'Show ↓') : null
    ),
    e('div', {style:{display:'flex',gap:8}},
      e('input', {
        ref: inputRef,
        value: input,
        onChange: function(ev){ setInput(ev.target.value); },
        onKeyDown: function(ev){ if(ev.key==='Enter') addIdea(); },
        placeholder: 'Idea just hit — capture it…',
        style:{flex:1,padding:'10px 14px',borderRadius:12,border:'1.5px solid '+(input?IDEA_ACCENT+'60':BORDER),background:CARD2,fontSize:14,fontFamily:'inherit',outline:'none',transition:'border-color 0.2s'}
      }),
      e('button', {
        onClick: addIdea,
        style:{padding:'10px 14px',borderRadius:12,background:input.trim()?'linear-gradient(135deg,'+IDEA_ACCENT+',#F97316)':'#E8E8F0',border:'none',color:input.trim()?'white':MUTED,fontSize:16,cursor:input.trim()?'pointer':'default',transition:'all 0.2s',fontFamily:'inherit'}
      }, '→')
    ),
    expanded && allIdeas.length > 0 ? e('div', {style:{marginTop:10,display:'flex',flexDirection:'column',gap:6}},
      ...allIdeas.map(function(idea){
        var t = new Date(idea.time).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
        var isEditing = editingIdea === idea.id;
        return e('div', {key:idea.id, style:{display:'flex',alignItems:'flex-start',gap:8,padding:'10px 12px',background:IDEA_ACCENT+'08',borderRadius:12,border:'1px solid '+(isEditing?IDEA_ACCENT+'60':IDEA_ACCENT+'20')}},
          e('div', {style:{flex:1}},
            isEditing
              ? e('input', {
                  autoFocus:true,
                  value:editDraft,
                  onChange:function(ev){setEditDraft(ev.target.value);},
                  onKeyDown:function(ev){ if(ev.key==='Enter') saveEdit(idea.id); if(ev.key==='Escape'){setEditingIdea(null);} },
                  onBlur:function(){ saveEdit(idea.id); },
                  style:{width:'100%',fontSize:13,padding:'4px 8px',borderRadius:8,border:'1.5px solid '+IDEA_ACCENT,fontFamily:'inherit',outline:'none'}
                })
              : e('div', {style:{fontSize:13,color:TEXT,lineHeight:1.5}}, idea.text),
            e('div', {style:{fontSize:10,color:MUTED,marginTop:3}}, idea.date === td ? 'Today · '+t : idea.date+' · '+t)
          ),
          isEditing
            ? e('button', {onClick:function(){ saveEdit(idea.id); }, style:{background:IDEA_ACCENT+'20',border:'none',borderRadius:8,padding:'5px 8px',fontSize:12,cursor:'pointer',flexShrink:0,fontFamily:'inherit',color:IDEA_ACCENT,fontWeight:700}}, '✓')
            : e('button', {onClick:function(){ setEditingIdea(idea.id); setEditDraft(idea.text); }, title:'Edit', style:{background:'none',border:'none',borderRadius:8,padding:'5px 6px',fontSize:13,cursor:'pointer',flexShrink:0,color:MUTED}}, '✏️'),
          e('button', {onClick:function(){ setSortingIdea(idea); setPickingProject(false); }, title:'Sort to a list', style:{background:'#F9731618',border:'none',borderRadius:8,padding:'5px 8px',fontSize:12,cursor:'pointer',flexShrink:0,fontFamily:'inherit',color:'#F97316',fontWeight:700}}, 'Sort →'),
          e('button', {onClick:function(){ discussIdea(idea); }, title:'Discuss with Claude', style:{background:PURPLE+'12',border:'none',borderRadius:8,padding:'5px 8px',fontSize:13,cursor:'pointer',flexShrink:0,fontFamily:'inherit',color:PURPLE,fontWeight:700}}, '💬'),
          e('button', {onClick:function(){ deleteIdea(idea.id); }, style:{background:'none',border:'none',color:MUTED,fontSize:14,cursor:'pointer',padding:'4px',flexShrink:0}}, '✕')
        );
      })
    ) : null

    var current = form.photos || [];

    if(remaining <= 0) return;
    var toProcess = Array.from(files).slice(0, remaining);
    toProcess.forEach(function(file) {
      var reader = new FileReader();
      reader.onload = function(ev) {
        var img = new Image();
        img.onload = function() {
          var MAX = 900;
          var scale = Math.min(1, MAX / Math.max(img.width, img.height));
          var w = Math.round(img.width * scale);
          var h = Math.round(img.height * scale);
          var canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          var dataUrl = canvas.toDataURL('image/jpeg', 0.72);

            var next = [...(prev.photos||[])];
            if(next.length < 2) next.push(dataUrl);

        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);

function TimeBlockBanner({priorities}) {
  const [now, setNow] = useState(() => new Date());
  useEffect(() => {
    var t = setInterval(() => setNow(new Date()), 30000);
    return () => clearInterval(t);
  }, []);

  function parseMin(str) {
    if (!str) return null;
    var m = str.match(/(\d+):(\d+)\s*(AM|PM)/i);
    if (!m) return null;
    var h = parseInt(m[1]), mn = parseInt(m[2]), ap = m[3].toUpperCase();
    if (ap === 'PM' && h !== 12) h += 12;
    if (ap === 'AM' && h === 12) h = 0;
    return h * 60 + mn;
  }

  var nowMin = now.getHours() * 60 + now.getMinutes();

  // Pull exclusively from Day view's scheduled blocks
  var dayScheduled = load('dayScheduled') || [];
  var timed = dayScheduled.map(function(s) {
    return {name: s.label, color: s.color || ACCENT, startMin: s.minute, dur: s.durationMin || 60};
  }).sort(function(a, b) { return a.startMin - b.startMin; });

  // Build blocks using actual duration — don't stretch to next block start
  var blocks = timed.map(function(p) { return {
    name: p.name,
    color: p.color,
    startMin: p.startMin,
    endMin: p.startMin + p.dur
  }; });

  var current = null, next = null;
  for (var i = 0; i < blocks.length; i++) {
    if (nowMin >= blocks[i].startMin && nowMin < blocks[i].endMin) { current = blocks[i]; next = blocks[i + 1] || null; break; }
    if (nowMin < blocks[i].startMin) { next = blocks[i]; break; }
  }

  function fmtCountdown(mins) {
    if (mins <= 0) return '0m';
    var h = Math.floor(mins / 60), m = mins % 60;
    return h > 0 ? h + 'h ' + m + 'm' : m + 'm';
  }

  if (!current && !next) return e('div', {style:{marginBottom:16, borderRadius:16, background:'rgba(142,142,170,0.07)', border:'1.5px solid '+BORDER, padding:'14px 16px'}},
    e('div', {style:{fontSize:11,fontWeight:700,letterSpacing:1.2,textTransform:'uppercase',color:MUTED,marginBottom:4}}, 'Time Block'),
    e('div', {style:{fontSize:14,color:MUTED}}, 'Nothing scheduled for today')
  );

  if (!current) {
    // Open period — next block exists but hasn't started
    var minsUntil = next.startMin - nowMin;
    return e('div', {style:{marginBottom:16, borderRadius:16, background:'rgba(142,142,170,0.07)', border:'1.5px solid '+BORDER, padding:'14px 16px'}},
      e('div', {style:{fontSize:11,fontWeight:700,letterSpacing:1.2,textTransform:'uppercase',color:MUTED,marginBottom:6}}, 'Open Block'),
      e('div', {style:{display:'flex',alignItems:'center',justifyContent:'space-between'}},
        e('div', {style:{fontSize:15,color:TEXT}}, 'Next activity starts in'),
        e('div', {style:{display:'flex',flexDirection:'column',alignItems:'flex-end'}},
          e('div', {style:{fontWeight:800,fontSize:20,color:ACCENT}}, fmtCountdown(minsUntil)),
          e('div', {style:{fontSize:11,fontWeight:700,color:MUTED,letterSpacing:0.5}}, 'left')
        )
      ),
      e('div', {style:{fontSize:12,color:MUTED,marginTop:4}},
        e('span', {style:{color:TEXT,fontWeight:600}}, next.name)
      )
    );
  }

  var minsLeft = current.endMin - nowMin;
  return e('div', {style:{marginBottom:16, borderRadius:16, background:'linear-gradient(135deg,'+current.color+'18,'+current.color+'08)', border:'1.5px solid '+current.color+'40', padding:'14px 16px'}},
    e('div', {style:{fontSize:11,fontWeight:700,letterSpacing:1.2,textTransform:'uppercase',color:current.color,marginBottom:6}}, 'Now'),
    e('div', {style:{display:'flex',alignItems:'center',gap:10,marginBottom:next?8:0}},
      e('div', {style:{width:10,height:10,borderRadius:'50%',background:current.color,flexShrink:0,boxShadow:'0 0 6px '+current.color}}),
      e('div', {style:{fontWeight:800,fontSize:18,color:TEXT,flex:1}}, current.name),
      e('div', {style:{textAlign:'center'}},
        e('div', {style:{fontWeight:800,fontSize:20,color:current.color,lineHeight:1}}, fmtCountdown(minsLeft)),
        e('div', {style:{fontSize:10,fontWeight:600,color:current.color,opacity:0.7,letterSpacing:1,textTransform:'uppercase'}}, 'left')
      )
    ),
    next ? e('div', {style:{fontSize:12,color:MUTED,paddingLeft:20}},
      'Up next: ', e('span', {style:{color:TEXT,fontWeight:600}}, next.name), ' — starting in ', e('span', {style:{fontWeight:700}}, fmtCountdown(next.startMin - nowMin))
    ) : null
  );
}

<script>
'use strict';

function ProjectsCard({projectItems, projectLog, setProjectLog, setTab}) {
  const td = today();
  const [logModal, setLogModal] = useState(null);
  const [logNote, setLogNote] = useState('');

  var activeProjects = (projectItems||[]).filter(function(p){return p.status!=='done';});

  function loggedToday(pid) {
    var entry = (projectLog[td]||{})[pid];
    return entry && (entry.note || entry === true);
  }

  function openLog(p) { setLogModal(p); setLogNote(''); }

  function submitLog() {
    if(!logNote.trim() || !logModal) return;
    var dayLog = Object.assign({}, projectLog[td]||{});
    dayLog[logModal.id] = { note: logNote.trim(), time: new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}) };
    var next = Object.assign({}, projectLog); next[td] = dayLog;
    setProjectLog(next); save('projectLog', next);
    setLogModal(null); setLogNote('');
  }

  var loggedCount = activeProjects.filter(function(p){return loggedToday(p.id);}).length;

  return e('div', {className:'card'},
    // Log modal
    logModal ? e('div', {style:{position:'fixed',inset:0,background:'rgba(26,24,51,0.55)',zIndex:1000,display:'flex',alignItems:'flex-end',justifyContent:'center'},
      onClick:function(ev){if(ev.target===ev.currentTarget)setLogModal(null);}},
      e('div', {style:{background:'#fff',borderRadius:'20px 20px 0 0',padding:'24px 20px 32px',width:'100%',maxWidth:480}},
        e('div', {style:{display:'flex',alignItems:'center',gap:12,marginBottom:16}},
          e('div', {style:{width:44,height:44,borderRadius:'50%',background:logModal.color+'18',border:'2px solid '+logModal.color,display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,flexShrink:0}}, logModal.emoji),
          e('div', {},
            e('div', {style:{fontSize:16,fontWeight:800,color:TEXT}}, logModal.name),
            e('div', {style:{fontSize:12,color:MUTED}}, 'Log what you worked on')
          )
        ),
        // Next action reminder
        (function(){
          var nextTask = (logModal.tasks||[]).find(function(t){return !t.done;});
          return nextTask ? e('div', {style:{background:logModal.color+'12',border:'1.5px solid '+logModal.color+'30',borderRadius:10,padding:'8px 12px',marginBottom:14,fontSize:13,color:TEXT}},
            e('span', {style:{color:logModal.color,fontWeight:700}}, '→ Next: '), nextTask.text
          ) : null;
        })(),
        e('textarea', {
          className:'input', placeholder:'What did you work on today?', value:logNote, rows:3,
          style:{resize:'none',marginBottom:12},
          onInput:function(ev){setLogNote(ev.target.value);},
          autoFocus:true
        }),
        e('div', {style:{display:'flex',gap:10}},
          e('button', {className:'btn-ghost', onClick:function(){setLogModal(null);}}, 'Cancel'),
          e('button', {className:'btn-primary', style:{background:logModal.color,flex:1}, onClick:submitLog}, 'Log it')
        )
      )
    ) : null,

    e('div', {style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}},
      e('div', {style:{fontSize:11,fontWeight:700,letterSpacing:1.2,textTransform:'uppercase',color:MUTED}}, 'Projects'),
      e('div', {style:{fontSize:13,fontWeight:700,color:PURPLE,background:PURPLE+'12',padding:'5px 12px',borderRadius:12}},
        loggedCount+'/'+activeProjects.length+' logged today'
      )
    ),
    e('div', {style:{display:'flex',gap:12,overflowX:'auto',paddingBottom:4}},
      ...activeProjects.map(function(p) {
        var done = loggedToday(p.id);
        return e('div', {key:p.id, onClick:function(){ if(!done) openLog(p); }, style:{display:'flex',flexDirection:'column',alignItems:'center',gap:6,flexShrink:0,cursor:done?'default':'pointer',minWidth:60}},
          e('div', {className:'habit-circle'+(done?' done':''), style:{borderColor:done?p.color:'transparent'}},
            p.emoji,
            done ? e('div', {style:{position:'absolute',bottom:-2,right:-2,width:18,height:18,borderRadius:'50%',background:p.color,display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,color:'white',border:'2px solid white'}}, '✓') : null
          ),
          e('div', {style:{fontSize:10,fontWeight:700,color:done?TEXT:MUTED,textAlign:'center',maxWidth:60,lineHeight:1.2}}, p.name)
        );
      })

    e('button', {style:{display:'flex',alignItems:'center',justifyContent:'space-between',paddingTop:10,marginTop:2,fontSize:13,fontWeight:700,color:PURPLE,cursor:'pointer',border:'none',background:'none',width:'100%',fontFamily:'inherit'},onClick:()=>setTab('projects-progress')},
      e('span',{},'View project progress'), e('span',{},'›')
    )
  );
}

function ProjectsProgressScreen({projectItems, setProjectItems, projectLog, setProjectLog, setTab}) {
  const [adding, setAdding] = useState(false);
  const [name, setName] = useState(''), [emoji, setEmoji] = useState(''), [color, setColor] = useState(PURPLE), [desc, setDesc] = useState('');
  const [expanded, setExpanded] = useState({});
  const [editingTask, setEditingTask] = useState(null);
  const [newTaskText, setNewTaskText] = useState('');
  const [editingProject, setEditingProject] = useState(null);
  const [editName, setEditName] = useState(''), [editEmoji, setEditEmoji] = useState(''), [editColor, setEditColor] = useState('');
  const [dragId, setDragId] = useState(null);
  const [overId, setOverId] = useState(null);
  const cardRefs = React.useRef({});
  const COLORS = [PURPLE,ACCENT,'#FF6B9D','#00E5CC','#FFB347','#FF6B6B','#10B981','#F59E0B'];
  const EMOJIS = ['🏠','🚀','💼','🌱','🎯','📦','🔧','🎨','💡','📋','🏗️','⚙️','🌍','🧩','📈','🤝','🧹','🪚','🚽','⛳','👧','🧩','🗄️','💻'];
  const STATUSES = ['not-started','active','blocked','done'];
  const STATUS_LABEL = {'not-started':'Not Started','active':'Active','blocked':'Blocked','done':'Done'};
  const STATUS_COLOR = {'not-started':MUTED,'active':ACCENT,'blocked':'#F59E0B','done':'#10B981'};
  const td = today();

  function addProject(){
    if(!name.trim())return;
    var p={id:'proj'+Date.now(),name,emoji:emoji||'🎯',color,desc,status:'active',blocker:'',tasks:[]};
    var next=[...projectItems,p];setProjectItems(next);save('projectItems',next);
    setName('');setEmoji('');setDesc('');setAdding(false);
  }
  function removeProject(id){var next=projectItems.filter(function(p){return p.id!==id;});setProjectItems(next);save('projectItems',next);}
  function updateProject(id, patch) {
    var next = projectItems.map(function(p){ return p.id===id ? Object.assign({},p,patch) : p; });
    setProjectItems(next); save('projectItems', next);
  }
  function addTask(pid) {
    if(!newTaskText.trim())return;
    var task={id:'t'+Date.now(),text:newTaskText.trim(),done:false};
    var next=projectItems.map(function(p){return p.id===pid?Object.assign({},p,{tasks:[...(p.tasks||[]),task]}):p;});
    setProjectItems(next);save('projectItems',next);setNewTaskText('');
  }
  function toggleTask(pid,tid){
    var next=projectItems.map(function(p){
      if(p.id!==pid)return p;
      return Object.assign({},p,{tasks:(p.tasks||[]).map(function(t){return t.id===tid?Object.assign({},t,{done:!t.done}):t;})});
    });
    setProjectItems(next);save('projectItems',next);
  }
  function deleteTask(pid,tid){
    var next=projectItems.map(function(p){
      if(p.id!==pid)return p;
      return Object.assign({},p,{tasks:(p.tasks||[]).filter(function(t){return t.id!==tid;})});
    });
    setProjectItems(next);save('projectItems',next);
  }
  function toggleExpand(id){ setExpanded(function(ex){ var n=Object.assign({},ex); n[id]=!n[id]; return n; }); }
  function startEdit(p){ setEditingProject(p.id); setEditName(p.name); setEditEmoji(p.emoji||'🎯'); setEditColor(p.color||PURPLE); setExpanded(function(ex){ return Object.assign({},ex,{[p.id]:true}); }); }
  function saveEdit(id){ updateProject(id,{name:editName.trim()||editName,emoji:editEmoji,color:editColor}); setEditingProject(null); }
  function handleDragTouchStart(id, e) {
    e.stopPropagation();
    setDragId(id);
    setOverId(id);
  }
  function handleDragTouchMove(e) {
    if(!dragId) return;
    var touch = e.touches[0];
    var y = touch.clientY;
    var found = null;
    activeProjects.forEach(function(p) {
      var el = cardRefs.current[p.id];
      if(!el) return;
      var rect = el.getBoundingClientRect();
      if(y >= rect.top && y <= rect.bottom) found = p.id;
    });

      // Frequency toggle

          })

        )
