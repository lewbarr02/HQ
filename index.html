  function renderWatch() {
    var ACCENT_WATCH = '#30D158'; // Apple green
    var sorted = watchLog.slice().sort(function(a,b){return a.date<b.date?1:-1;});

    // Trend data — last 8 weeks by week
    function weekKey(dateStr) {
      var d = new Date(dateStr+'T12:00:00');
      var day = d.getDay(); // 0=Sun
      var monday = new Date(d); monday.setDate(d.getDate() - ((day+6)%7));
      return monday.toISOString().slice(0,10);
    }
    var byWeek = {};
    watchLog.forEach(function(w){
      if(!w.date) return;
      var wk = weekKey(w.date);
      if(!byWeek[wk]) byWeek[wk] = {activeCal:0,sessions:0,minutes:0};
      byWeek[wk].activeCal += (w.activeCalories||0);
      byWeek[wk].sessions  += 1;
      byWeek[wk].minutes   += (w.duration||0);
    });
    var weekKeys = Object.keys(byWeek).sort().slice(-8);
    var maxCal = Math.max(1, ...weekKeys.map(function(k){return byWeek[k].activeCal;}));

    // 30-day totals
    var cutoff = new Date(); cutoff.setDate(cutoff.getDate()-30);
    var last30 = watchLog.filter(function(w){return w.date && new Date(w.date+'T12:00:00')>=cutoff;});
    var total30Cal  = last30.reduce(function(s,w){return s+(w.activeCalories||0);},0);
    var total30Sess = last30.length;
    var avg30Min    = total30Sess ? Math.round(last30.reduce(function(s,w){return s+(w.duration||0);},0)/total30Sess) : 0;

    function resizeAndUpload(file) {
      setWatchUploading(true); setWatchError(null);
      var reader = new FileReader();
      reader.onload = function(ev) {
        var img = new Image();
        img.onload = async function() {
          var MAX=1200, w=img.width, h=img.height;
          if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}
          var canvas=document.createElement('canvas'); canvas.width=w; canvas.height=h;
          canvas.getContext('2d').drawImage(img,0,0,w,h);
          var b64 = canvas.toDataURL('image/jpeg',0.82).split(',')[1];
          try {
            var resp = await fetch(COACH_URL,{method:'POST',headers:{'Content-Type':'application/json','Authorization':COACH_AUTH},body:JSON.stringify({type:'extract-watch-screenshot',photo:b64})});
            if(!resp.ok){var t=await resp.text();throw new Error(t);}
            var result = await resp.json();
            if(!result.parsed) throw new Error('Could not read workout data from screenshot.');
            var entry = Object.assign({id:'ww'+Date.now(), uploadedAt:new Date().toISOString()}, result.parsed);
            if(!entry.date) entry.date = today();
            var newLog = [entry, ...watchLog];
            setWatchLog(newLog); save('watchLog', newLog);
          } catch(err){ setWatchError(err.message||'Upload failed.'); }
          setWatchUploading(false);
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    }

    function deleteEntry(id) {
      var newLog = watchLog.filter(function(w){return w.id!==id;});
      setWatchLog(newLog); save('watchLog',newLog);
    }

    return e('div',{style:{display:'flex',flexDirection:'column',gap:16,padding:'16px'}},

      // Upload card
      e('div',{style:{background:'#fff',borderRadius:16,padding:'20px',border:'1px solid '+BORDER,textAlign:'center'}},
        watchUploading
          ? e('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',gap:10}},
              e('div',{style:{fontSize:28}},'⌚'),
              e('div',{style:{fontSize:14,fontWeight:700,color:TEXT}},'Reading your workout...'),
              e('div',{style:{fontSize:12,color:MUTED}},'Claude is extracting the data'))
          : e('div',{},
              e('div',{style:{fontSize:32,marginBottom:8}},'📸'),
              e('div',{style:{fontSize:15,fontWeight:800,color:TEXT,marginBottom:4}},'Upload Watch Screenshot'),
              e('div',{style:{fontSize:12,color:MUTED,marginBottom:14}},'Finish a workout → screenshot → upload here'),
              e('label',{style:{display:'inline-block',padding:'12px 28px',borderRadius:12,background:'linear-gradient(135deg,'+ACCENT_WATCH+',#00C6FF)',color:'white',fontSize:14,fontWeight:800,cursor:'pointer'}},
                '+ Add Screenshot',
                e('input',{type:'file',accept:'image/*',style:{display:'none'},onChange:function(ev){if(ev.target.files[0])resizeAndUpload(ev.target.files[0]);}})
              )
            ),
        watchError?e('div',{style:{marginTop:12,background:'#FEF2F2',borderRadius:10,padding:'10px 14px',fontSize:12,color:'#DC2626',textAlign:'left'}},'⚠️ '+watchError):null
      ),

      // 30-day summary pills
      last30.length>0?e('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10}},
        e('div',{style:{background:'#F0FDF4',borderRadius:14,padding:'14px 12px',textAlign:'center',border:'1px solid #86EFAC'}},
          e('div',{style:{fontSize:20,fontWeight:800,color:ACCENT_WATCH}},total30Cal.toLocaleString()),
          e('div',{style:{fontSize:10,fontWeight:700,color:'#166534',textTransform:'uppercase',letterSpacing:0.6}},'Active Cal'),
          e('div',{style:{fontSize:10,color:'#4ADE80'}},'30 days')
        ),
        e('div',{style:{background:'#EFF6FF',borderRadius:14,padding:'14px 12px',textAlign:'center',border:'1px solid #93C5FD'}},
          e('div',{style:{fontSize:20,fontWeight:800,color:'#3B82F6'}},total30Sess),
          e('div',{style:{fontSize:10,fontWeight:700,color:'#1E40AF',textTransform:'uppercase',letterSpacing:0.6}},'Sessions'),
          e('div',{style:{fontSize:10,color:'#93C5FD'}},'30 days')
        ),
        e('div',{style:{background:'#FFF7ED',borderRadius:14,padding:'14px 12px',textAlign:'center',border:'1px solid #FCD34D'}},
          e('div',{style:{fontSize:20,fontWeight:800,color:'#F59E0B'}},avg30Min+'m'),
          e('div',{style:{fontSize:10,fontWeight:700,color:'#92400E',textTransform:'uppercase',letterSpacing:0.6}},'Avg Time'),
          e('div',{style:{fontSize:10,color:'#FCD34D'}},'per session')
        )
      ):null,

      // Weekly calorie bar chart
      weekKeys.length>0?e('div',{style:{background:'#fff',borderRadius:16,padding:'16px',border:'1px solid '+BORDER}},
        e('div',{style:{fontSize:12,fontWeight:800,color:TEXT,marginBottom:14}},'🔥 Active Calories — Weekly'),
        e('div',{style:{display:'flex',alignItems:'flex-end',gap:6,height:80}},
          ...weekKeys.map(function(wk){
            var wkData=byWeek[wk];
            var pct=Math.max(4,Math.round((wkData.activeCal/maxCal)*100));
            var label=new Date(wk+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
            return e('div',{key:wk,style:{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:4}},
              e('div',{style:{fontSize:9,color:MUTED,fontWeight:700}},wkData.activeCal>0?wkData.activeCal:''),
              e('div',{style:{width:'100%',height:pct+'%',borderRadius:'4px 4px 0 0',background:wkData.activeCal>0?'linear-gradient(180deg,'+ACCENT_WATCH+',#00C6FF)':'#F0F0F0',minHeight:4}}),
              e('div',{style:{fontSize:8,color:MUTED,textAlign:'center',lineHeight:1.2}},label)
            );
          })
        )
      ):null,

      // Session history
      sorted.length>0?e('div',{style:{background:'#fff',borderRadius:16,padding:'16px',border:'1px solid '+BORDER}},
        e('div',{style:{fontSize:12,fontWeight:800,color:TEXT,marginBottom:12}},'📋 Session History'),
        e('div',{style:{display:'flex',flexDirection:'column',gap:8}},
          ...sorted.map(function(w){
            return e('div',{key:w.id,style:{background:'#F8FAFC',borderRadius:12,padding:'12px',display:'flex',justifyContent:'space-between',alignItems:'flex-start'}},
              e('div',{},
                e('div',{style:{fontSize:13,fontWeight:800,color:TEXT}},w.workoutType||'Workout'),
                e('div',{style:{fontSize:11,color:MUTED,marginBottom:6}},w.date||''),
                e('div',{style:{display:'flex',gap:10,flexWrap:'wrap'}},
                  w.activeCalories?e('span',{style:{fontSize:11,fontWeight:700,color:ACCENT_WATCH}},w.activeCalories+' active cal'):null,
                  w.duration?e('span',{style:{fontSize:11,color:MUTED}},w.duration+' min'):null,
                  w.avgHeartRate?e('span',{style:{fontSize:11,color:'#EF4444'}},w.avgHeartRate+' bpm avg'):null
                )
              ),
              e('button',{onClick:function(){deleteEntry(w.id);},style:{background:'none',border:'none',fontSize:16,color:MUTED,cursor:'pointer',padding:'0 4px',lineHeight:1}},'×')
            );
          })
        )
      ):e('div',{style:{background:'#F8FAFC',borderRadius:16,padding:'24px',border:'1px dashed '+BORDER,textAlign:'center'}},
        e('div',{style:{fontSize:32,marginBottom:8}},'⌚'),
        e('div',{style:{fontSize:14,fontWeight:600,color:TEXT,marginBottom:4}},'No workouts yet'),
        e('div',{style:{fontSize:12,color:MUTED}},'Upload your first Apple Watch screenshot above')
      )
    );
  }

  function renderCoach() {
    if(coachPhase==='onboarding') return renderOnboarding();
    if(coachPhase==='checkin') return renderCheckinForm();
    if(coachPhase==='checkinResult') return renderCheckinResult();
    return renderMain();
  }

  return e('div', {style:{height:'100dvh',display:'flex',flexDirection:'column',background:'#F7F8FC',paddingTop:'env(safe-area-inset-top)',paddingBottom:'env(safe-area-inset-bottom)'}},
    // Header
    e('div', {style:{padding:'16px 20px 0',background:'#fff',borderBottom:'1px solid '+BORDER,flexShrink:0}},
      e('div', {style:{fontSize:20,fontWeight:800,marginBottom:14}}, '💪 Fitness'),
      e('div', {style:{display:'flex',gap:0}},
        ...[ ['log','+ Log Workout'], ['watch','⌚ Watch'], ['history','📋 History'], ['coach','🤖 Coach'] ].map(function(item){
          var active = view===item[0];
          return e('button',{key:item[0],onClick:function(){setView(item[0]);},style:{
            flex:1,padding:'10px 2px',fontSize:11,fontWeight:700,
            border:'none',borderBottom: active?'2.5px solid '+ACCENT:'2.5px solid transparent',
            background:'none',color:active?ACCENT:MUTED,cursor:'pointer',fontFamily:'inherit',
            transition:'all 0.15s',
          }},item[1]);
        })
      )
    ),
    // Body
    e('div', {style:{flex:1,overflowY:'auto',WebkitOverflowScrolling:'touch'}},
      view==='log'     ? renderLog()     :
      view==='watch'   ? renderWatch()   :
      view==='history' ? renderHistory() :
      renderCoach()
    ),
    // Execute overlay — full-screen, outside scroll container
    view==='execute' ? renderExecute() : null
  );
}

function MacroScreen({ setTab }) {
  var DEFAULT_TARGETS = {cal:2200, protein:180, carbs:200, fat:65};
  var [macroLog, setMacroLog] = useState(function(){ return load('macroLog') || {}; });
  var [targets, setTargets] = useState(function(){ return load('macroTargets') || DEFAULT_TARGETS; });
  var [logDate, setLogDate] = useState(today());
  var [adding, setAdding] = useState(false);
  var [editTarget, setEditTarget] = useState(null); // 'cal'|'protein'|'carbs'|'fat'
  var [targetDraft, setTargetDraft] = useState('');
  var [form, setForm] = useState({name:'',cal:'',protein:'',carbs:'',fat:''});
  var [editingMeal, setEditingMeal] = useState(null); // meal id being edited

  var td = today();

  function saveMacroLog(next){ setMacroLog(next); save('macroLog', next); }
  function saveTargets(next){ setTargets(next); save('macroTargets', next); }

  function shiftDate(d) {
    var dt = new Date(logDate+'T12:00:00');
    dt.setDate(dt.getDate()+d);
    var dk = dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');
    if(dk <= td) setLogDate(dk);
  }

  var meals = macroLog[logDate] || [];
  var totals = meals.reduce(function(acc,m){
    acc.cal += parseFloat(m.cal)||0;
    acc.protein += parseFloat(m.protein)||0;
    acc.carbs += parseFloat(m.carbs)||0;
    acc.fat += parseFloat(m.fat)||0;
    return acc;
  }, {cal:0,protein:0,carbs:0,fat:0});

  function addMeal() {
    if(!form.name.trim()) return;
    var meal = {
      id: Date.now().toString(),
      name: form.name.trim(),
      cal: parseFloat(form.cal)||0,
      protein: parseFloat(form.protein)||0,
      carbs: parseFloat(form.carbs)||0,
      fat: parseFloat(form.fat)||0,
    };
    var next = Object.assign({}, macroLog);
    if(editingMeal) {
      next[logDate] = (next[logDate]||[]).map(function(m){ return m.id===editingMeal ? meal : m; });
      meal.id = editingMeal;
      next[logDate] = (next[logDate]||[]).map(function(m){ return m.id===editingMeal ? Object.assign({},meal,{id:editingMeal}) : m; });
    } else {
      next[logDate] = (next[logDate]||[]).concat([meal]);
    }
    saveMacroLog(next);
    setForm({name:'',cal:'',protein:'',carbs:'',fat:''});
    setAdding(false);
    setEditingMeal(null);
  }

  function deleteMeal(id) {
    var next = Object.assign({}, macroLog);
    next[logDate] = (next[logDate]||[]).filter(function(m){ return m.id!==id; });
    saveMacroLog(next);
  }

  function startEdit(meal) {
    setForm({name:meal.name,cal:String(meal.cal||''),protein:String(meal.protein||''),carbs:String(meal.carbs||''),fat:String(meal.fat||'')});
    setEditingMeal(meal.id);
    setAdding(true);
  }

  function commitTarget() {
    var v = parseFloat(targetDraft);
    if(!isNaN(v) && v > 0) {
      var next = Object.assign({}, targets, {[editTarget]: Math.round(v)});
      saveTargets(next);
    }
    setEditTarget(null);
    setTargetDraft('');
  }

  var isToday = logDate === td;
  var dispDate = isToday ? 'Today' : new Date(logDate+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});

  var MACRO_BARS = [
    {key:'cal',    label:'Calories', unit:'kcal', color:'#FF6B35'},
    {key:'protein',label:'Protein',  unit:'g',    color:'#00C6FF'},
    {key:'carbs',  label:'Carbs',    unit:'g',    color:'#FFB347'},
    {key:'fat',    label:'Fat',      unit:'g',    color:'#7B2FFF'},
  ];

  return e('div', {className:'content'},
    // Header
    e('div', {style:{display:'flex',alignItems:'center',gap:8,marginBottom:16}},
      e('button', {onClick:function(){setTab('today');}, style:{background:'none',border:'none',fontSize:22,color:MUTED,cursor:'pointer',padding:'0 4px 0 0',lineHeight:1}}, '←'),
      e('div', {style:{fontSize:20,fontWeight:800,color:TEXT}}, '🥗 Macros'),
      e('div', {style:{display:'flex',alignItems:'center',gap:4,marginLeft:'auto'}},
        e('button', {onClick:function(){shiftDate(-1);}, style:{background:'none',border:'none',fontSize:18,color:MUTED,cursor:'pointer',padding:'2px 6px',lineHeight:1}}, '‹'),
        e('div', {style:{fontSize:13,fontWeight:700,color:TEXT,minWidth:60,textAlign:'center'}}, dispDate),
        e('button', {onClick:function(){shiftDate(1);}, disabled:isToday, style:{background:'none',border:'none',fontSize:18,color:isToday?'#ddd':MUTED,cursor:isToday?'default':'pointer',padding:'2px 6px',lineHeight:1}}, '›')
      )
    ),

    // Progress bars
    e('div', {className:'card', style:{marginBottom:16}},
      ...MACRO_BARS.map(function(bar, i){
        var val = Math.round(totals[bar.key]);
        var tgt = targets[bar.key];
        var pct = Math.min(100, Math.round(val/tgt*100));

        return e('div', {key:bar.key, style:{marginBottom: i<3?14:0}},

            },
              e('span', {style:{fontSize:12,fontWeight:700,color:TEXT}}, bar.label),

            ),
            e('div', {style:{fontSize:12,fontWeight:800,color:over?'#FF6B6B':bar.color}},
              val+' / '+tgt+' '+bar.unit,
              over ? e('span',{style:{fontSize:10,marginLeft:4,color:'#FF6B6B'}}, '▲') : null
            )
          ),
          e('div', {style:{height:10,background:'#F0F2F8',borderRadius:5,overflow:'hidden'}},
            e('div', {style:{

    // Edit target modal
    editTarget ? e('div', {style:{

      display:'flex',alignItems:'center',justifyContent:'center',padding:24,
    }},
      e('div', {style:{background:'#fff',borderRadius:20,padding:24,width:'100%',maxWidth:320}},
        e('div', {style:{fontSize:16,fontWeight:800,color:TEXT,marginBottom:16}},
          'Edit '+MACRO_BARS.find(function(b){return b.key===editTarget;}).label+' target'
        ),
        e('div', {style:{display:'flex',alignItems:'center',gap:8,marginBottom:20}},
          e('input', {
            type:'number', min:1,
            value:targetDraft,
            onInput:function(ev){setTargetDraft(ev.target.value);},
            onKeyDown:function(ev){if(ev.key==='Enter')commitTarget();},
            style:{flex:1,padding:'12px 14px',borderRadius:12,border:'1.5px solid '+BORDER,fontSize:20,fontWeight:700,textAlign:'center',fontFamily:'inherit',color:TEXT},
            autoFocus:true,

          e('span', {style:{fontSize:14,color:MUTED}}, MACRO_BARS.find(function(b){return b.key===editTarget;}).unit)
        ),
        e('div', {style:{display:'flex',gap:8}},
          e('button', {onClick:function(){setEditTarget(null);setTargetDraft('');}, style:{flex:1,padding:'12px',borderRadius:12,background:CARD2,border:'none',color:MUTED,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}, 'Cancel'),
          e('button', {onClick:commitTarget, style:{flex:2,padding:'12px',borderRadius:12,background:ACCENT,border:'none',color:'#1A1833',fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}, 'Save')
        )
      )
    ) : null,

    // Add meal button
    !adding ? e('button', {

        background:'linear-gradient(135deg,'+ACCENT+'20,'+PURPLE+'15)',

        color:ACCENT,fontSize:14,fontWeight:700,cursor:'pointer',fontFamily:'inherit',

      e('div', {style:{fontSize:14,fontWeight:800,color:TEXT,marginBottom:12}}, editingMeal ? 'Edit meal' : 'Log meal'),
      e('input', {
        className:'input', style:{marginBottom:10,fontSize:15},
        placeholder:'Meal name (e.g. Chicken + rice)',
        value:form.name,
        onInput:function(ev){setForm(function(f){return Object.assign({},f,{name:ev.target.value});});},
        autoFocus:true,
      }),
      e('div', {style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:12}},
        ...MACRO_BARS.map(function(bar){
          return e('div', {key:bar.key},
            e('div', {style:{fontSize:10,fontWeight:700,color:bar.color,marginBottom:4,textTransform:'uppercase',letterSpacing:0.5}}, bar.label+' ('+bar.unit+')'),
            e('input', {

function NotificationsScreen({ setTab }) {
  var [status, setStatus] = useState(function(){
    if (!('Notification' in window)) return 'unsupported';
    return Notification.permission; // 'default'|'granted'|'denied'
  });
  var [subscribed, setSubscribed] = useState(false);
  var [loading, setLoading] = useState(false);
  var [testLoading, setTestLoading] = useState(false);
  var [smsLoading, setSmsLoading] = useState(false);
  var [msg, setMsg] = useState('');

  useEffect(function(){
    if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
    navigator.serviceWorker.ready.then(function(reg){
      reg.pushManager.getSubscription().then(function(sub){ setSubscribed(!!sub); });
    });
  }, []);

  async function handleEnable() {
    setLoading(true); setMsg('');
    var result = await subscribeToPush();
    setLoading(false);
    if (result.ok) {
      setStatus('granted'); setSubscribed(true);
      setMsg('✅ Notifications enabled! You\'ll get nudges at 5 AM, 12 PM, and 9 PM.');
    } else if (result.reason === 'denied') {
      setStatus('denied');
      setMsg('❌ Blocked — open your browser settings and allow notifications for this site, then try again.');
    } else {
      setMsg('❌ ' + (result.reason || 'Something went wrong. Try again.'));
    }
  }

  async function handleDisable() {
    setLoading(true);
    await unsubscribeFromPush();
    setSubscribed(false); setLoading(false);
    setMsg('Notifications disabled.');
  }

  async function handleTest() {
    setTestLoading(true); setMsg('');
    try {
      var reg = await navigator.serviceWorker.ready;
      var sub = await reg.pushManager.getSubscription();
      if (!sub) { setMsg('⚠️ No subscription found — try re-enabling notifications.'); setTestLoading(false); return; }
      var resp = await fetch(SUPABASE_FN+'/send-push', {
        method:'POST',
        headers:{'Content-Type':'application/json','apikey':SUPABASE_ANON,'Authorization':'Bearer '+SUPABASE_ANON},
        body: JSON.stringify({type:'test', subscription: sub.toJSON()})
      });
      var data = await resp.json();
      if (data.sent > 0) setMsg('✅ Test sent! Check for a notification.');
      else setMsg('❌ Send failed: '+(data.errors?.[0]?.error||'unknown error'));
    } catch(err) {
      setMsg('❌ Error: '+(err.message||'Could not reach server'));
    }
    setTestLoading(false);
  }

  async function handleSmsTest() {
    setSmsLoading(true); setMsg('');
    try {
      var resp = await fetch(SUPABASE_FN+'/send-sms', {
        method:'POST',
        headers:{'Content-Type':'application/json','apikey':SUPABASE_ANON,'Authorization':'Bearer '+SUPABASE_ANON},
        body: JSON.stringify({type:'test'})
      });
      var data = await resp.json();
      if (data.sent) setMsg('✅ SMS sent! Check your phone.');
      else setMsg('❌ SMS failed: '+(data.error||'unknown error'));
    } catch(err) {
      setMsg('❌ Error: '+(err.message||'Could not reach server'));
    }
    setSmsLoading(false);
  }

  var SCHEDULES = [

    {time:'9:00 PM',  emoji:'🌙', label:'Evening routine', desc:'Wind down + CPAP reminder'},
  ];

  return e('div', {className:'content'},
    e('div', {style:{display:'flex',alignItems:'center',gap:8,marginBottom:20}},
      e('button', {onClick:function(){setTab('today');}, style:{background:'none',border:'none',fontSize:22,color:MUTED,cursor:'pointer',padding:'0 4px 0 0',lineHeight:1}}, '←'),
      e('div', {style:{fontSize:20,fontWeight:800,color:TEXT}}, '🔔 Notifications')
    ),

    // Status card
    e('div', {className:'card', style:{marginBottom:16,textAlign:'center'}},
      e('div', {style:{fontSize:40,marginBottom:8}}, subscribed ? '🔔' : '🔕'),
      e('div', {style:{fontSize:16,fontWeight:800,color:TEXT,marginBottom:4}},
        subscribed ? 'Notifications are ON' : status === 'denied' ? 'Notifications blocked' : 'Notifications are off'
      ),
      e('div', {style:{fontSize:13,color:MUTED,marginBottom:20,lineHeight:1.5}},
        subscribed ? 'You\'ll get nudges at the times below.' :
        status === 'denied' ? 'You\'ve blocked notifications. Go to browser settings → site settings to allow.' :
        status === 'unsupported' ? 'Push notifications aren\'t supported in this browser. Try Chrome or install as a PWA.' :
        'Enable to get aggressive ADHD-friendly nudges throughout the day.'
      ),
      status !== 'unsupported' ? (
        subscribed
          ? e('button', {onClick:handleDisable, disabled:loading, style:{padding:'12px 28px',borderRadius:14,background:CARD2,border:'1px solid '+BORDER,color:MUTED,fontWeight:700,cursor:'pointer',fontFamily:'inherit',fontSize:14}},
              loading ? 'Disabling...' : 'Turn off notifications')
          : e('button', {onClick:handleEnable, disabled:loading || status==='denied', style:{padding:'14px 32px',borderRadius:14,background:'linear-gradient(135deg,'+ACCENT+','+PURPLE+')',border:'none',color:'#fff',fontWeight:800,cursor: status==='denied'?'default':'pointer',fontFamily:'inherit',fontSize:15,opacity: status==='denied'?0.5:1,boxShadow:'0 6px 20px rgba(0,198,255,0.3)'}},

    ),

    // Schedule

      ...SCHEDULES.map(function(s, i){

    // Test buttons
    e('div', {className:'card', style:{marginBottom:16,textAlign:'center'}},

      e('div', {style:{display:'flex',flexDirection:'column',gap:10}},
        e('button', {onClick:handleTest, disabled:testLoading || !subscribed, style:{padding:'11px 24px',borderRadius:12,background:CARD2,border:'1px solid '+BORDER,color:subscribed?TEXT:MUTED,fontWeight:700,cursor:subscribed?'pointer':'default',fontFamily:'inherit',fontSize:14,opacity:subscribed?1:0.4}},
          testLoading ? 'Sending...' : '🧪 Send test push notification'),

function ProgressPhotosScreen({ setTab }) {
  var [index, setIndex] = useState(function(){ return load('photoIndex') || []; });
  var [viewing, setViewing] = useState(null); // {date, dataUrl, note}
  var [adding, setAdding] = useState(false);
  var [note, setNote] = useState('');
  var [pending, setPending] = useState(null); // compressed dataUrl before saving
  var [uploading, setUploading] = useState(false);
  var fileRef = React.useRef(null);

  function saveIndex(next) { setIndex(next); save('photoIndex', next); }

  function compressImage(file, cb) {
    var reader = new FileReader();
    reader.onload = function(ev) {
      var img = new Image();
      img.onload = function() {
        var MAX = 600;
        var scale = Math.min(1, MAX / Math.max(img.width, img.height));
        var w = Math.round(img.width * scale);
        var h = Math.round(img.height * scale);
        var canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        var ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        cb(canvas.toDataURL('image/jpeg', 0.72));
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  }

  function handleFile(ev) {
    var file = ev.target.files && ev.target.files[0];
    if(!file) return;
    setUploading(true);
    compressImage(file, function(dataUrl) {
      setPending(dataUrl);
      setUploading(false);
      setAdding(true);
    });
    ev.target.value = '';
  }

  function savePhoto() {
    if(!pending) return;
    var dt = today();
    localStorage.setItem('hq_photo_'+dt, pending);
    var next = index.filter(function(e){ return e.date !== dt; });
    next.unshift({date:dt, note:note.trim()});
    saveIndex(next);
    setPending(null);
    setNote('');
    setAdding(false);
  }

  function deletePhoto(date) {
    localStorage.removeItem('hq_photo_'+date);
    saveIndex(index.filter(function(e){ return e.date !== date; }));
    setViewing(null);
  }

  function openPhoto(entry) {
    var dataUrl = localStorage.getItem('hq_photo_'+entry.date);
    if(dataUrl) setViewing({date:entry.date, dataUrl:dataUrl, note:entry.note});
  }

  var td = today();
  var lastPhotoDate = index.length > 0 ? index[0].date : null;
  var daysSincePhoto = lastPhotoDate
    ? Math.round((new Date(td+'T12:00:00') - new Date(lastPhotoDate+'T12:00:00')) / 86400000)
    : null;
  var dueThisWeek = daysSincePhoto === null || daysSincePhoto >= 7;

  // Lightbox
  if(viewing) {
    return e('div', {style:{
      position:'fixed',inset:0,zIndex:200,background:'rgba(0,0,0,0.92)',
      display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
      padding:'20px',paddingTop:'calc(20px + env(safe-area-inset-top))',
      paddingBottom:'calc(20px + env(safe-area-inset-bottom))',
    }},
      e('div', {style:{display:'flex',alignItems:'center',width:'100%',maxWidth:480,marginBottom:12,gap:8}},
        e('div', {style:{fontSize:13,fontWeight:700,color:'rgba(255,255,255,0.7)'}},
          new Date(viewing.date+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'long',day:'numeric',year:'numeric'})
        ),
        e('div', {style:{flex:1}}),
        e('button', {
          onClick:function(){if(confirm('Delete this photo?'))deletePhoto(viewing.date);},
          style:{background:'rgba(255,100,100,0.2)',border:'1px solid rgba(255,100,100,0.4)',color:'#FDA29B',borderRadius:8,padding:'6px 12px',fontSize:12,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}
        }, 'Delete'),
        e('button', {
          onClick:function(){setViewing(null);},
          style:{background:'rgba(255,255,255,0.1)',border:'none',color:'#fff',borderRadius:8,padding:'6px 14px',fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:'inherit',marginLeft:4}
        }, '✕')
      ),
      e('img', {src:viewing.dataUrl, style:{maxWidth:'100%',maxHeight:'70vh',borderRadius:12,objectFit:'contain'}}),
      viewing.note ? e('div', {style:{marginTop:12,fontSize:13,color:'rgba(255,255,255,0.7)',fontStyle:'italic',textAlign:'center',maxWidth:400}}, '"'+viewing.note+'"') : null
    );
  }

  return e('div', {className:'content'},
    e('input', {ref:fileRef, type:'file', accept:'image/*', capture:'environment', style:{display:'none'}, onChange:handleFile}),

    e('div', {style:{display:'flex',alignItems:'center',gap:8,marginBottom:16}},
      e('button', {onClick:function(){setTab('today');}, style:{background:'none',border:'none',fontSize:22,color:MUTED,cursor:'pointer',padding:'0 4px 0 0',lineHeight:1}}, '←'),
      e('div', {style:{fontSize:20,fontWeight:800,color:TEXT}}, '📸 Progress Photos'),
      e('div', {style:{marginLeft:'auto',fontSize:11,fontWeight:700,
        color:dueThisWeek?'#FF6B6B':'#10B981',
        background:dueThisWeek?'#FF6B6B15':'#10B98115',
        padding:'3px 10px',borderRadius:10}},
        dueThisWeek ? (daysSincePhoto===null?'No photos yet':'Due — '+daysSincePhoto+'d ago') : '✓ This week'
      )
    ),

    // Add photo flow
    !adding ? e('button', {
      onClick:function(){ fileRef.current && fileRef.current.click(); },
      style:{
        width:'100%',padding:'16px',borderRadius:16,marginBottom:20,
        background:'linear-gradient(135deg,#10B98120,#10B98108)',
        border:'1.5px dashed #10B98160',
        color:'#10B981',fontSize:14,fontWeight:700,cursor:'pointer',fontFamily:'inherit',
        display:'flex',alignItems:'center',justifyContent:'center',gap:8,
      }
    }, uploading ? '⏳ Compressing...' : '📷 Take / Upload Photo') :
    e('div', {style:{background:'#fff',borderRadius:16,border:'1.5px solid #10B98140',padding:'16px',marginBottom:20}},
      e('img', {src:pending, style:{width:'100%',borderRadius:10,marginBottom:12,maxHeight:260,objectFit:'cover'}}),
      e('input', {

      e('div', {style:{display:'flex',gap:8}},
        e('button', {onClick:function(){setPending(null);setNote('');setAdding(false);},
          style:{flex:1,padding:'12px',borderRadius:12,background:CARD2,border:'none',color:MUTED,fontWeight:700,cursor:'pointer',fontFamily:'inherit',fontSize:14}

        }, 'Save Photo ✓')
      )
    ),

    // Gallery
    index.length === 0
      ? e('div', {style:{textAlign:'center',color:MUTED,marginTop:40,fontSize:14}}, 'No photos yet. Take your first one above.')
      : e('div', {},
          e('div', {style:{fontSize:11,fontWeight:700,letterSpacing:1.2,textTransform:'uppercase',color:MUTED,marginBottom:12}}, index.length+' photos'),
          e('div', {style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}},
            ...index.map(function(entry){
              var dataUrl = localStorage.getItem('hq_photo_'+entry.date);
              if(!dataUrl) return null;
              var d = new Date(entry.date+'T12:00:00');
              var label = d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
              return e('div', {key:entry.date,
                onClick:function(){openPhoto(entry);},

            })

    e('div', {style:{height:20}})

function FoodPipelineScreen({ setTab }) {
  function getWeekKey(d) {
    var dt = d ? new Date(d) : new Date();
    dt.setHours(12,0,0,0);
    var jan4 = new Date(dt.getFullYear(),0,4);
    var w = Math.ceil((((dt-jan4)/86400000)+jan4.getDay()+1)/7);
    return dt.getFullYear()+'-W'+String(w).padStart(2,'0');
  }
  var WEEK = getWeekKey();
  var DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  var DEFAULT_STAGES = [
    { id:'plan', label:'Plan', emoji:'📋', color:'#7B2FFF', day:0,
      items:[
        {id:'p1',name:'Pick proteins for the week'},
        {id:'p2',name:'Choose veggie sides'},
        {id:'p3',name:'Pick 2 breakfasts to rotate'},
        {id:'p4',name:'Write the grocery list'},
      ]
    },
    { id:'shop', label:'Shop', emoji:'🛒', color:'#00C6FF', day:1,
      items:[
        {id:'s1',name:'Buy proteins'},
        {id:'s2',name:'Buy veggies + produce'},
        {id:'s3',name:'Buy breakfast items'},
        {id:'s4',name:'Restock pantry staples'},
      ]
    },
    { id:'prep', label:'Prep', emoji:'🥗', color:'#10B981', day:0,
      items:[
        {id:'r1',name:'Cook proteins (batch)'},
        {id:'r2',name:'Chop & roast veggies'},
        {id:'r3',name:'Portion into containers'},
        {id:'r4',name:'Prep breakfasts'},
      ]
    },
  ];

  var [data, setData] = useState(function(){ return load('foodPipeline') || {stages:DEFAULT_STAGES, weekLog:{}}; });
  var [open, setOpen] = useState(null);
  var [editingStage, setEditingStage] = useState(null);
  var [newItemText, setNewItemText] = useState('');

  function saveData(next) { setData(next); save('foodPipeline', next); }

  function isWeekDone(stageId) {
    return !!((data.weekLog||{})[WEEK+'_'+stageId]);
  }

  function toggleWeekDone(stageId) {
    var wl = Object.assign({}, data.weekLog||{});
    var key = WEEK+'_'+stageId;
    wl[key] = !wl[key];
    saveData(Object.assign({}, data, {weekLog:wl}));
  }

  function toggleItem(stageId, itemId) {
    var wl = Object.assign({}, data.weekLog||{});
    var key = WEEK+'_'+stageId+'_'+itemId;
    wl[key] = !wl[key];
    saveData(Object.assign({}, data, {weekLog:wl}));
  }

  function isItemDone(stageId, itemId) {
    return !!((data.weekLog||{})[WEEK+'_'+stageId+'_'+itemId]);
  }

  function setStageDay(stageId, day) {
    var stages = data.stages.map(function(s){ return s.id===stageId ? Object.assign({},s,{day:parseInt(day)}) : s; });
    saveData(Object.assign({}, data, {stages:stages}));
  }

  function addItem(stageId) {
    if(!newItemText.trim()) return;
    var stages = data.stages.map(function(s){
      if(s.id !== stageId) return s;
      var items = s.items.concat([{id:'u'+Date.now(), name:newItemText.trim()}]);
      return Object.assign({},s,{items:items});
    });
    saveData(Object.assign({}, data, {stages:stages}));
    setNewItemText('');
  }

  function removeItem(stageId, itemId) {
    var stages = data.stages.map(function(s){
      if(s.id !== stageId) return s;
      return Object.assign({},s,{items:s.items.filter(function(i){return i.id!==itemId;})});
    });
    saveData(Object.assign({}, data, {stages:stages}));
  }

  var stages = data.stages || DEFAULT_STAGES;
  var doneCount = stages.filter(function(s){ return isWeekDone(s.id); }).length;

  // Streak: count consecutive weeks all 3 done
  var streak = 0;
  var checkWeek = new Date(); checkWeek.setHours(12,0,0,0);
  for(var wi=0; wi<52; wi++) {
    var wk = getWeekKey(checkWeek);
    var allDone = stages.every(function(s){ return !!((data.weekLog||{})[wk+'_'+s.id]); });
    if(!allDone) break;
    streak++;
    checkWeek.setDate(checkWeek.getDate()-7);
  }

  return e('div', {className:'content'},
    e('div', {style:{display:'flex',alignItems:'center',gap:8,marginBottom:16}},
      e('button', {onClick:function(){setTab('today');}, style:{background:'none',border:'none',fontSize:22,color:MUTED,cursor:'pointer',padding:'0 4px 0 0',lineHeight:1}}, '←'),
      e('div', {style:{fontSize:20,fontWeight:800,color:TEXT}}, '🍽️ Food Pipeline'),
      streak > 0 ? e('div', {style:{marginLeft:'auto',fontSize:11,fontWeight:700,color:'#F59E0B',background:'#F59E0B15',padding:'3px 10px',borderRadius:10}}, '🔥 '+streak+'wk') : null
    ),

    // This week pipeline bar
    e('div', {style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:20}},
      ...stages.map(function(s){
        var done = isWeekDone(s.id);
        return e('div', {key:s.id,
          onClick:function(){ setOpen(open===s.id?null:s.id); },
          style:{
            borderRadius:14, padding:'14px 10px', textAlign:'center', cursor:'pointer',
            background: done ? s.color+'20' : '#fff',
            border:'1.5px solid '+(done ? s.color : BORDER),
            transition:'all 0.15s',
          }
        },
          e('div', {style:{fontSize:26, marginBottom:4}}, s.emoji),
          e('div', {style:{fontSize:12,fontWeight:800,color:done?s.color:TEXT,marginBottom:2}}, s.label),
          e('div', {style:{fontSize:10,color:MUTED}}, DAYS[s.day]),
          done ? e('div', {style:{fontSize:11,fontWeight:700,color:s.color,marginTop:4}}, '✓ done') :
                 e('div', {style:{fontSize:10,color:MUTED,marginTop:4}}, doneCount+'/3 this week')
        );
      })
    ),

    // Expanded stage
    stages.map(function(s){
      if(open !== s.id) return null;
      var allChecked = s.items.every(function(i){ return isItemDone(s.id,i.id); });
      return e('div', {key:s.id, style:{background:'#fff',borderRadius:16,border:'1.5px solid '+s.color+'40',marginBottom:16,overflow:'hidden'}},
        // Stage header
        e('div', {style:{padding:'14px 16px',borderBottom:'1px solid rgba(100,80,220,0.08)',display:'flex',alignItems:'center',gap:10}},
          e('span', {style:{fontSize:22}}, s.emoji),
          e('div', {style:{flex:1}},
            e('div', {style:{fontSize:15,fontWeight:800,color:TEXT}}, s.label+' Day'),
            e('div', {style:{fontSize:11,color:MUTED,marginTop:2}}, 'Scheduled: ',
              e('select', {

              editingStage===s.id ? e('button',{onClick:function(){removeItem(s.id,item.id);},style:{background:'none',border:'none',color:'#FDA29B',fontSize:16,cursor:'pointer',padding:0,lineHeight:1}},'×') : null
            );

          // Add item / edit toggle
          editingStage===s.id ? e('div', {style:{display:'flex',gap:8,marginTop:10}},

            }),
            e('button', {onClick:function(){addItem(s.id);}, style:{padding:'8px 14px',borderRadius:10,background:s.color,border:'none',color:'#fff',fontWeight:700,cursor:'pointer',fontFamily:'inherit',fontSize:13}}, '+'),
            e('button', {onClick:function(){setEditingStage(null);setNewItemText('');}, style:{padding:'8px 14px',borderRadius:10,background:CARD2,border:'none',color:MUTED,fontWeight:700,cursor:'pointer',fontFamily:'inherit',fontSize:13}}, 'Done')
          ) : e('button', {

          }, '+ Edit checklist')
        )
      );
    }),

    // Weekly history (last 6 weeks)
    e('div', {className:'card'},
      e('div', {style:{fontSize:11,fontWeight:700,letterSpacing:1.2,textTransform:'uppercase',color:MUTED,marginBottom:12}}, 'Recent Weeks'),
      e('div', {style:{display:'flex',flexDirection:'column',gap:8}},
        ...Array.from({length:6}, function(_,wi){
          var d = new Date(); d.setHours(12,0,0,0);
          d.setDate(d.getDate() - wi*7);
          var wk = getWeekKey(d);
          var label = wi===0 ? 'This week' : wi===1 ? 'Last week' : d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
          return e('div', {key:wk, style:{display:'flex',alignItems:'center',gap:8}},
            e('div', {style:{fontSize:12,color:MUTED,minWidth:70,flexShrink:0}}, label),
            e('div', {style:{display:'flex',gap:5,flex:1}},
              ...stages.map(function(s){
                var done = !!((data.weekLog||{})[wk+'_'+s.id]);
                return e('div', {key:s.id, style:{
                  flex:1, padding:'4px 0', borderRadius:6, textAlign:'center',

                  background: done ? s.color+'20' : '#F0F2F8',

                }}, done ? s.emoji : '–');
              })
            )
          );
        })
      )
    ),

    e('div', {style:{height:20}})
  );
}

function AreasScreen({ areasData, setAreasData, setTab }) {
  const [openArea, setOpenArea] = useState(null);

  function getArea(id) { return areasData[id] || { tasks:[], notes:'', goals:[] }; }

  function saveArea(id, data) {
    const next = {...areasData, [id]: data};
    setAreasData(next);
    save('areasData', next);
  }

  if(openArea) {
    const area = LIFE_AREAS.find(function(a){return a.id===openArea;});
    return e(AreaDetail, {
      area: area,
      data: getArea(openArea),
      onSave: function(d){ saveArea(openArea, d); },
      onBack: function(){ setOpenArea(null); },
    });
  }

  // Count totals per area for preview
  return e('div', {className:'content'},
    e('div', {style:{display:'flex',alignItems:'center',gap:8,marginBottom:4}},
      e('button', {onClick:function(){setTab('today');}, style:{background:'none',border:'none',fontSize:22,color:MUTED,cursor:'pointer',padding:'0 4px 0 0',lineHeight:1}}, '←'),
      e('div', {style:{fontSize:22,fontWeight:800}}, 'Life Areas')
    ),
    e('div', {style:{fontSize:14,color:MUTED,marginBottom:20}}, 'Tap an area to open it'),
    e('div', {style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}},
      ...LIFE_AREAS.map(function(area) {
        const data = getArea(area.id);
        const tasksDone = data.tasks.filter(function(t){return t.done;}).length;
        const tasksTotal = data.tasks.length;
        const goalsTotal = data.goals.length;
        const hasNotes = data.notes && data.notes.trim().length > 0;

        return e('button', {key:area.id,
          onClick:function(){setOpenArea(area.id);},
          style:{
            background:'#fff', borderRadius:20,
            border:`1.5px solid ${area.color}25`,
            padding:'20px 16px', textAlign:'left',
            cursor:'pointer', fontFamily:'inherit',
            boxShadow:`0 4px 16px ${area.color}15`,
            display:'flex', flexDirection:'column', gap:10,
            minHeight:130,
            transition:'transform 0.15s',
          }
        },
          e('div', {style:{display:'flex',alignItems:'center',justifyContent:'space-between'}},
            e('div', {style:{fontSize:32,lineHeight:1}}, area.emoji),
            e('div', {style:{
              width:10, height:10, borderRadius:'50%',
              background: tasksTotal>0||hasNotes||goalsTotal>0 ? area.color : '#E8E8F0',
            }})
          ),
          e('div', {style:{fontSize:16,fontWeight:800,color:TEXT}}, area.name),
          e('div', {style:{display:'flex',gap:6,flexWrap:'wrap'}},
            tasksTotal>0 ? e('div', {style:{fontSize:10,fontWeight:700,padding:'3px 8px',borderRadius:10,background:`${area.color}15`,color:area.color}},
              tasksDone+'/'+tasksTotal+' tasks'
            ) : null,
            goalsTotal>0 ? e('div', {style:{fontSize:10,fontWeight:700,padding:'3px 8px',borderRadius:10,background:`${area.color}15`,color:area.color}},
              goalsTotal+' goal'+(goalsTotal>1?'s':'')
            ) : null,
            hasNotes ? e('div', {style:{fontSize:10,fontWeight:700,padding:'3px 8px',borderRadius:10,background:`${area.color}15`,color:area.color}},
              '📝 notes'
            ) : null,
            !tasksTotal&&!goalsTotal&&!hasNotes ? e('div', {style:{fontSize:10,color:MUTED}}, 'Empty — tap to add') : null
          )
        );
      })
    )
  );
}

function AreaDetail({ area, data, onSave, onBack }) {
  const [tab, setTab] = useState('tasks');
  const [tasks, setTasks] = useState(data.tasks || []);
  const [notes, setNotes] = useState(data.notes || '');
  const [goals, setGoals] = useState(data.goals || []);
  const [newTask, setNewTask] = useState('');
  const [newGoal, setNewGoal] = useState('');
  const [newGoalTarget, setNewGoalTarget] = useState('');
  const [notesSaved, setNotesSaved] = useState(false);
  const noteTimer = useRef(null);
  const [bodyEntries, setBodyEntries] = useState(data.bodyEntries || []);
  const [newWeight, setNewWeight] = useState('');
  const [newBF, setNewBF] = useState('');
  const [newDate, setNewDate] = useState(today());

  function saveTasks(next) { setTasks(next); onSave({tasks:next,notes,goals,bodyEntries}); }
  function saveGoals(next) { setGoals(next); onSave({tasks,notes,goals:next,bodyEntries}); }
  function saveNotes(val) {
    setNotes(val); onSave({tasks,notes:val,goals,bodyEntries});
    if(noteTimer.current) clearTimeout(noteTimer.current);
    setNotesSaved(true);
    noteTimer.current = setTimeout(function(){setNotesSaved(false);}, 2000);
  }
  function addBodyEntry() {
    if(!newWeight && !newBF) return;
    var entry = {id:Date.now().toString(), date:newDate, weight:newWeight?parseFloat(newWeight):null, bf:newBF?parseFloat(newBF):null};
    var next = [...bodyEntries, entry].sort(function(a,b){return a.date.localeCompare(b.date);});
    setBodyEntries(next);
    onSave({tasks,notes,goals,bodyEntries:next});
    setNewWeight(''); setNewBF('');
  }
  function deleteBodyEntry(id) {
    var next = bodyEntries.filter(function(e){return e.id!==id;});
    setBodyEntries(next);
    onSave({tasks,notes,goals,bodyEntries:next});
  }

  function addTask() {
    if(!newTask.trim()) return;
    var next = [...tasks, {id:Date.now().toString(), text:newTask.trim(), done:false}];
    saveTasks(next); setNewTask('');
  }
  function toggleTask(id) {
    var task = tasks.find(function(t){return t.id===id;});
    var next = tasks.map(function(t){return t.id===id?{...t,done:!t.done}:t;});
    saveTasks(next);
    if(task && !task.done) addPassiveWin('Task done: '+task.text);
  }
  function deleteTask(id) {
    saveTasks(tasks.filter(function(t){return t.id!==id;}));
  }
  function addGoal() {
    if(!newGoal.trim()) return;
    var next = [...goals, {id:Date.now().toString(), title:newGoal.trim(), target:newGoalTarget||'', progress:0, done:false}];
    saveGoals(next); setNewGoal(''); setNewGoalTarget('');
  }
  function toggleGoal(id) {
    var next = goals.map(function(g){return g.id===id?{...g,done:!g.done}:g;});
    saveGoals(next);
  }
  function deleteGoal(id) {
    saveGoals(goals.filter(function(g){return g.id!==id;}));
  }

  const activeTasks = tasks.filter(function(t){return !t.done;});
  const doneTasks = tasks.filter(function(t){return t.done;});
  const activeGoals = goals.filter(function(g){return !g.done;});
  const doneGoals = goals.filter(function(g){return g.done;});

  return e('div', {style:{height:'100dvh',display:'flex',flexDirection:'column',background:'#F7F8FC',paddingTop:'env(safe-area-inset-top)',paddingBottom:'env(safe-area-inset-bottom)'}},

    // Header
    e('div', {style:{
      padding:'14px 20px 12px', background:'#fff',
      borderBottom:'1px solid '+BORDER,
      display:'flex', alignItems:'center', gap:14, flexShrink:0,
    }},
      e('button', {onClick:onBack, style:{background:'none',border:'none',cursor:'pointer',fontSize:22,color:area.color,padding:'0 4px',fontFamily:'inherit'}}, '‹'),
      e('div', {style:{fontSize:22,lineHeight:1}}, area.emoji),
      e('div', {style:{flex:1}},
        e('div', {style:{fontSize:18,fontWeight:800,color:TEXT}}, area.name)
      )
    ),

    // Tab bar
    e('div', {style:{display:'flex',background:'#fff',borderBottom:'1px solid '+BORDER,flexShrink:0}},
      ...( area.id === 'fitness'
        ? ['tasks','goals','body','notes']
        : ['tasks','goals','notes']
      ).map(function(t) {
        var labels = {tasks:'✅ Tasks', goals:'🎯 Goals', notes:'📝 Notes', body:'📈 Body'};
        var isActive = tab===t;
        return e('button', {key:t, onClick:function(){setTab(t);}, style:{
          flex:1, padding:'12px 4px', border:'none', background:'none',
          fontSize:13, fontWeight:700, cursor:'pointer', fontFamily:'inherit',
          color:isActive?area.color:MUTED,
          borderBottom:isActive?'2.5px solid '+area.color:'2.5px solid transparent',
        }}, labels[t]);
      })
    ),

    // Content
    e('div', {style:{flex:1,overflowY:'auto',WebkitOverflowScrolling:'touch',padding:'16px'}},

      // TASKS
      tab==='tasks' ? e('div', {},
        // Add task
        e('div', {style:{display:'flex',gap:8,marginBottom:16}},
          e('input', {className:'input', style:{flex:1,marginBottom:0}, placeholder:'Add a task...', value:newTask, onInput:function(ev){setNewTask(ev.target.value);}, onKeyDown:function(ev){if(ev.key==='Enter')addTask();}}),
          e('button', {onClick:addTask, style:{...({padding:'0 18px',borderRadius:12,border:'none',background:`linear-gradient(135deg,${area.color},${area.color}CC)`,color:'white',fontSize:15,fontWeight:700,cursor:'pointer',fontFamily:'inherit',minHeight:48,flexShrink:0})}} , '+')
        ),

        // Active tasks
        activeTasks.length===0 ? e('div', {style:{textAlign:'center',color:MUTED,padding:'32px 0',fontSize:14}}, 'No tasks yet. Add one above ☝️') : null,
        ...activeTasks.map(function(t) {
          return e('div', {key:t.id, style:{display:'flex',alignItems:'center',gap:12,padding:'14px 16px',background:'#fff',borderRadius:14,marginBottom:8,boxShadow:'0 2px 8px rgba(100,80,220,0.05)',border:'1px solid '+BORDER}},
            e('button', {onClick:function(){toggleTask(t.id);}, style:{width:24,height:24,borderRadius:'50%',border:'2px solid '+area.color,background:'transparent',cursor:'pointer',flexShrink:0,fontFamily:'inherit',display:'flex',alignItems:'center',justifyContent:'center'}}),
            e('span', {style:{flex:1,fontSize:15,fontWeight:500,color:TEXT}}, t.text),
            e('button', {onClick:function(){deleteTask(t.id);}, style:{background:'none',border:'none',color:'#C0C0D0',cursor:'pointer',fontSize:18,padding:'0 4px'}}, '×')
          );
        }),

        // Done tasks
        doneTasks.length>0 ? e('div', {style:{marginTop:16}},
          e('div', {style:{fontSize:11,fontWeight:700,letterSpacing:1.2,textTransform:'uppercase',color:MUTED,marginBottom:8}}, 'Completed ('+doneTasks.length+')'),
          ...doneTasks.map(function(t) {
            return e('div', {key:t.id, style:{display:'flex',alignItems:'center',gap:12,padding:'12px 16px',background:'#F8F8F8',borderRadius:14,marginBottom:8,opacity:0.6}},
              e('button', {onClick:function(){toggleTask(t.id);}, style:{width:24,height:24,borderRadius:'50%',border:'none',background:area.color,cursor:'pointer',flexShrink:0,color:'white',fontSize:12,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'inherit'}}, '✓'),
              e('span', {style:{flex:1,fontSize:14,color:MUTED,textDecoration:'line-through'}}, t.text),
              e('button', {onClick:function(){deleteTask(t.id);}, style:{background:'none',border:'none',color:'#C0C0D0',cursor:'pointer',fontSize:18}}, '×')
            );
          })
        ) : null
      ) : null,

      // GOALS
      tab==='goals' ? e('div', {},
        e('div', {style:{display:'flex',gap:8,marginBottom:16}},
          e('input', {className:'input', style:{flex:1,marginBottom:0}, placeholder:'Goal title...', value:newGoal, onInput:function(ev){setNewGoal(ev.target.value);}}),
          e('input', {className:'input', style:{width:90,marginBottom:0}, placeholder:'Target', value:newGoalTarget, onInput:function(ev){setNewGoalTarget(ev.target.value);}}),
          e('button', {onClick:addGoal, style:{padding:'0 18px',borderRadius:12,border:'none',background:`linear-gradient(135deg,${area.color},${area.color}CC)`,color:'white',fontSize:15,fontWeight:700,cursor:'pointer',fontFamily:'inherit',minHeight:48,flexShrink:0}}, '+')
        ),
        activeGoals.length===0 ? e('div', {style:{textAlign:'center',color:MUTED,padding:'32px 0',fontSize:14}}, 'No goals yet. Add one above ☝️') : null,
        ...activeGoals.map(function(g) {
          return e('div', {key:g.id, style:{background:'#fff',borderRadius:16,padding:'16px',marginBottom:10,boxShadow:'0 2px 8px rgba(100,80,220,0.05)',border:'1px solid '+BORDER,borderLeft:'4px solid '+area.color}},
            e('div', {style:{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:8}},
              e('div', {style:{flex:1}},
                e('div', {style:{fontSize:15,fontWeight:600,color:TEXT,marginBottom:4}}, g.title),
                g.target ? e('div', {style:{fontSize:12,color:MUTED}}, 'Target: '+g.target) : null
              ),
              e('div', {style:{display:'flex',gap:6}},
                e('button', {onClick:function(){toggleGoal(g.id);}, style:{fontSize:12,fontWeight:700,padding:'6px 12px',borderRadius:10,border:'1.5px solid '+area.color,background:'transparent',color:area.color,cursor:'pointer',fontFamily:'inherit'}}, 'Done'),
                e('button', {onClick:function(){deleteGoal(g.id);}, style:{background:'none',border:'none',color:'#C0C0D0',cursor:'pointer',fontSize:18}}, '×')
              )
            )
          );
        }),
        doneGoals.length>0 ? e('div', {style:{marginTop:16}},
          e('div', {style:{fontSize:11,fontWeight:700,letterSpacing:1.2,textTransform:'uppercase',color:MUTED,marginBottom:8}}, 'Completed ('+doneGoals.length+')'),
          ...doneGoals.map(function(g) {
            return e('div', {key:g.id, style:{display:'flex',alignItems:'center',gap:12,padding:'12px 16px',background:'#F8F8F8',borderRadius:14,marginBottom:8,opacity:0.6}},
              e('div', {style:{width:8,height:8,borderRadius:'50%',background:area.color,flexShrink:0}}),
              e('span', {style:{flex:1,fontSize:14,color:MUTED,textDecoration:'line-through'}}, g.title),
              e('button', {onClick:function(){deleteGoal(g.id);}, style:{background:'none',border:'none',color:'#C0C0D0',cursor:'pointer',fontSize:18}}, '×')
            );
          })
        ) : null
      ) : null,

      // BODY TRACKING
      tab==='body' ? e('div', {},
        e('div', {className:'card', style:{padding:'16px',marginBottom:12}},
          e('div', {style:{fontSize:11,fontWeight:700,letterSpacing:1.2,textTransform:'uppercase',color:MUTED,marginBottom:12}}, 'Log Entry'),
          e('div', {style:{display:'flex',gap:8,marginBottom:10}},
            e('input', {type:'date', className:'input', style:{flex:1,marginBottom:0}, value:newDate, onInput:function(ev){setNewDate(ev.target.value);}})
          ),
          e('div', {style:{display:'flex',gap:8,marginBottom:10}},
            e('div', {style:{flex:1}},
              e('div', {style:{fontSize:11,fontWeight:700,color:MUTED,marginBottom:4}}, 'WEIGHT (lbs)'),
              e('input', {type:'number', className:'input', style:{marginBottom:0}, placeholder:'e.g. 215', value:newWeight, onInput:function(ev){setNewWeight(ev.target.value);}})
            ),
            e('div', {style:{flex:1}},
              e('div', {style:{fontSize:11,fontWeight:700,color:MUTED,marginBottom:4}}, 'BODY FAT (%)'),
              e('input', {type:'number', className:'input', style:{marginBottom:0}, placeholder:'e.g. 22.5', value:newBF, onInput:function(ev){setNewBF(ev.target.value);}})
            )
          ),
          e('button', {onClick:addBodyEntry, style:{width:'100%',padding:'14px',borderRadius:12,border:'none',background:'linear-gradient(135deg,'+area.color+','+area.color+'99)',color:'white',fontSize:15,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}, 'Save Entry')
        ),

        bodyEntries.length > 1 ? e('div', {className:'card'},
          e('div', {style:{fontSize:11,fontWeight:700,letterSpacing:1.2,textTransform:'uppercase',color:MUTED,marginBottom:16}}, 'Trends'),
          // Weight chart
          e('div', {style:{marginBottom:24}},
            e('div', {style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}},
              e('div', {style:{fontSize:13,fontWeight:700,color:TEXT}}, '⚖️ Weight (lbs)'),
              bodyEntries.filter(function(e){return e.weight;}).length > 0 ? e('div', {style:{fontSize:12,fontWeight:800,color:area.color}},
                bodyEntries.filter(function(e){return e.weight;})[bodyEntries.filter(function(e){return e.weight;}).length-1].weight + ' lbs'
              ) : null
            ),
            e(MiniLineChart, {
              entries: bodyEntries.filter(function(e){return e.weight;}),
              field: 'weight',
              color: area.color,
              unit: 'lbs',
            })
          ),
          bodyEntries.filter(function(e){return e.bf;}).length > 1 ? e('div', {},
            e('div', {style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}},
              e('div', {style:{fontSize:13,fontWeight:700,color:TEXT}}, '📊 Body Fat (%)'),
              e('div', {style:{fontSize:12,fontWeight:800,color:'#FF6B9D'}},
                bodyEntries.filter(function(e){return e.bf;})[bodyEntries.filter(function(e){return e.bf;}).length-1].bf + '%'
              )
            ),
            e(MiniLineChart, {
              entries: bodyEntries.filter(function(e){return e.bf;}),
              field: 'bf',
              color: '#FF6B9D',
              unit: '%',
            })
          ) : null
        ) : bodyEntries.length === 1 ? e('div', {style:{textAlign:'center',color:MUTED,padding:'20px 0',fontSize:13}}, 'Add one more entry to see your trend 📈') : null,

        // Entry history
        bodyEntries.length > 0 ? e('div', {className:'card'},
          e('div', {style:{fontSize:11,fontWeight:700,letterSpacing:1.2,textTransform:'uppercase',color:MUTED,marginBottom:12}}, 'History'),
          ...[...bodyEntries].reverse().map(function(entry) {
            var d = new Date(entry.date+'T12:00:00');
            var label = d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
            return e('div', {key:entry.id, style:{display:'flex',alignItems:'center',gap:12,padding:'10px 0',borderBottom:'1px solid rgba(100,80,220,0.07)'}},
              e('div', {style:{flex:1}},
                e('div', {style:{fontSize:12,fontWeight:700,color:MUTED}}, label),
                e('div', {style:{display:'flex',gap:12,marginTop:2}},
                  entry.weight ? e('span', {style:{fontSize:14,fontWeight:700,color:area.color}}, entry.weight+' lbs') : null,
                  entry.bf ? e('span', {style:{fontSize:14,fontWeight:700,color:'#FF6B9D'}}, entry.bf+'% BF') : null
                )
              ),
              e('button', {onClick:function(){deleteBodyEntry(entry.id);}, style:{background:'none',border:'none',color:'#C0C0D0',cursor:'pointer',fontSize:18}}, '×')
            );
          })
        ) : null
      ) : null,

      // NOTES
      tab==='notes' ? e('div', {},
        e('div', {style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}},
          e('div', {style:{fontSize:13,color:MUTED}}),
          notesSaved ? e('div', {style:{fontSize:11,fontWeight:700,color:'#00C864'}}, '✓ Saved') : null
        ),
        e('textarea', {
          className:'input',
          style:{minHeight:400,resize:'none',lineHeight:1.7,fontSize:15},
          placeholder:'Anything on your mind about '+area.name+'...',
          value:notes,
          onInput:function(ev){saveNotes(ev.target.value);}
        })
      ) : null
    )
  );
}

class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { error: null };
  }
  static getDerivedStateFromError(err) {
    return { error: err };
  }
  componentDidCatch(err, info) {
    console.error('HQ Error:', err, info);
  }
  render() {
    if (this.state.error) {
      return e('div', {style:{padding:24,fontFamily:'monospace',fontSize:12,color:'#333',background:'#fff',minHeight:'100dvh',overflowY:'auto'}},

      );
    }
    return this.props.children;
  }
}

      var SIX_HOURS = 6 * 60 * 60 * 1000;
      var THREE_HOURS = 3 * 60 * 60 * 1000;
      var now = Date.now();
      var changed = false;
      var next = sessions.map(function(s) {
        if(s.endTime) return s;
        var age = now - new Date(s.startTime).getTime();
        if(age < SIX_HOURS) return s;
        var lastActivity = s.checkIns.length > 0
          ? new Date(s.checkIns[s.checkIns.length-1].time).getTime()
          : new Date(s.startTime).getTime();
        if(now - lastActivity < THREE_HOURS) return s;
        // Auto-close at last check-in time (or startTime + reasonable window)
        var endTime = s.checkIns.length > 0
          ? s.checkIns[s.checkIns.length-1].time
          : new Date(new Date(s.startTime).getTime() + 2*60*60*1000).toISOString();
        changed = true;
        return Object.assign({}, s, {endTime: endTime, autoClose: true});
      });
      if(changed) { setFlowLog(next); save('flowLog', next); }
      return next;

      }
      if(activeCustomRoutine.phase === 'complete') {
        return e(CustomRoutineComplete, {routine:acr, logs:customRoutineLogs, onDone:function(){ setActiveCustomRoutine(null); }});
      }
    }
  }

  if(showRoutineBuilder) {
    return e(RoutineBuilder, {
      onSave: function(r){ var next=[...customRoutines,r]; setCustomRoutines(next); save('customRoutines',next); setShowRoutineBuilder(false); },
      onClose: function(){ setShowRoutineBuilder(false); }
    });
  }

  var moreOverlay = moreOpen ? e('div', {style:{position:'absolute',inset:0,zIndex:80,background:'rgba(247,248,252,0.97)',backdropFilter:'blur(16px)',display:'flex',flexDirection:'column',padding:'20px 20px 0'}},
    e('div', {style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:24,flexShrink:0}},
      e('div', {style:{fontSize:20,fontWeight:800}}, 'More'),
      e('button', {onClick:()=>setMoreOpen(false), style:{background:CARD2,border:'none',width:36,height:36,borderRadius:'50%',cursor:'pointer',fontSize:18,display:'flex',alignItems:'center',justifyContent:'center'}}, '✕')
    ),
    e('div', {style:{overflowY:'auto',flex:1,paddingBottom:90}},
      ...MORE_ITEMS.map(item => e('button', {key:item.id, onClick:()=>{setTab(item.id);setMoreOpen(false);}, style:{display:'flex',alignItems:'center',gap:16,padding:'16px 4px',border:'none',borderBottom:'1px solid rgba(100,80,220,0.08)',background:'none',cursor:'pointer',textAlign:'left',fontFamily:'inherit',width:'100%'}},
        e('span', {style:{fontSize:24,width:36,textAlign:'center'}}, item.icon),
        e('span', {style:{fontSize:16,fontWeight:600,color:TEXT}}, item.label),
        e('span', {style:{marginLeft:'auto',color:MUTED,fontSize:18}}, '›')
      ))
    )
  ) : null;

  if(isWide) {
    return e('div', {id:'app-inner', style:{height:'100dvh',display:'flex',flexDirection:'row',width:'100%',background:'#F7F8FC',overflow:'hidden',position:'relative'}},
      splash ? e(Splash) : null,
      e(Sidebar, {tab, setTab, moreOpen, setMoreOpen, NAV, dateStr, groceries, priorities: load('priorities')||[]}),
      e('div', {style:{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',minWidth:0}},
        e('div', {className:'header'},
          e('div', {style:{fontSize:14,fontWeight:700,color:TEXT}}, 'Hi Lewis.'),
          e('div', {style:{display:'flex',alignItems:'center',gap:10}},
            e('div', {style:{fontSize:12,color:MUTED,fontWeight:600}}, dateStr),
            wakeLog && wakeLog[now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0')] ?
              e('div', {style:{fontSize:11,fontWeight:700,color:ACCENT,background:ACCENT+'15',padding:'3px 10px',borderRadius:10}}, 'Wake: '+wakeLog[now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0')]) : null,
            calcMorningStreak(routineLog||{}) > 0 ?
              e('div', {style:{fontSize:11,fontWeight:700,color:'#FFB347',background:'#FFB34715',padding:'3px 10px',borderRadius:10}}, '🔥 '+calcMorningStreak(routineLog||{})+'-day streak') : null,
            e('button', {
              title: 'Update app to latest version',
              onClick: async function() {
                if ('serviceWorker' in navigator) {
                  var regs = await navigator.serviceWorker.getRegistrations();
                  for (var r of regs) await r.unregister();
                }
                if ('caches' in window) {
                  var keys = await caches.keys();
                  for (var k of keys) await caches.delete(k);
                }
                location.reload();
              },
              style:{background:'none',border:'none',cursor:'pointer',fontSize:16,padding:'2px 4px',color:MUTED,lineHeight:1,flexShrink:0}
            }, '↺')
          )
        ),
        e('div', {style:{flex:1,overflow:'hidden',display:'flex',flexDirection:'column',position:'relative'}},
          renderScreen(),
          moreOverlay
        )
      )
    );
  }

  return e('div', {id:'app-inner', style:{height:'100dvh',display:'flex',flexDirection:'column',maxWidth:480,margin:'0 auto',background:'#F7F8FC',overflow:'hidden',position:'relative'}},
    splash ? e(Splash) : null,
    e('div', {className:'header'},
      e('img', {src:LOGO, style:{width:56,height:56,objectFit:'contain'}}),
      e('div', {style:{display:'flex',alignItems:'center',gap:10}},
        e('div', {style:{textAlign:'right'}},
          e('div', {style:{fontSize:13,color:MUTED,fontWeight:600}}, dateStr),
          e('div', {style:{fontSize:9,color:'#ccc'}}, 'v1781033505')
        ),
        e('button', {
          title: 'Update app to latest version',
          onClick: async function() {
            if ('serviceWorker' in navigator) {
              var regs = await navigator.serviceWorker.getRegistrations();
              for (var r of regs) await r.unregister();
            }
            if ('caches' in window) {
              var keys = await caches.keys();
              for (var k of keys) await caches.delete(k);
            }
            location.reload();
          },
          style:{background:'none',border:'none',cursor:'pointer',fontSize:18,padding:'2px 4px',color:MUTED,lineHeight:1,flexShrink:0}
        }, '↺')
      )
    ),
    e('div', {style:{flex:1,overflow:'hidden',display:'flex',flexDirection:'column',position:'relative'}},
      renderScreen(),
      moreOverlay
    ),
    e('nav', {className:'nav'},
      ...NAV.map(n => {
        var active = tab===n.id||(n.id==='more'&&moreOpen);
        var color = active ? ACCENT : '#8E8EAA';
        var mineCount = n.id==='grocery' ? (groceries||[]).filter(function(g){return (g.list||'wife')==='mine'&&!g.done;}).length : 0;
        var todoCount = n.id==='todo' ? (load('priorities')||[]).filter(function(p){return !p.done;}).length : 0;
        var navBadge = mineCount || todoCount;
        return e('button', {key:n.id, className:'nav-btn'+(active?' active':''),
          onClick:()=>{if(n.id==='more'){setMoreOpen(o=>!o);}else{setTab(n.id);setMoreOpen(false);}}},
          e('div', {style:{position:'relative',display:'inline-flex'}},
            e(NavIcon, {name:n.icon, size:22, color:color}),
            navBadge > 0 ? e('span', {style:{position:'absolute',top:-5,right:-7,background:'#EF4444',color:'#fff',borderRadius:99,fontSize:10,fontWeight:900,minWidth:16,height:16,display:'flex',alignItems:'center',justifyContent:'center',padding:'0 3px',lineHeight:1,boxShadow:'0 1px 4px rgba(0,0,0,0.25)'}}, navBadge) : null
          ),
          n.label
        );
      })
    )
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(e(App));
</script>
</body>
</html>
